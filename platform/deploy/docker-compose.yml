services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_collab
      POSTGRES_USER: ai_collab
      POSTGRES_PASSWORD: ai_collab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+psycopg://ai_collab:ai_collab@postgres:5432/ai_collab
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ../api/app:/app/app

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../web:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  web_node_modules:

