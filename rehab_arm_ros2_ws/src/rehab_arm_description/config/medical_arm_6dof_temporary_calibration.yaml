schema_version: medical_arm_6dof_temporary_calibration_v1
status: draft_engineering_zero_only
created_date: 2026-06-17
authority: m33_final_safety_authority

purpose:
  summary: 当前姿态先作为工程临时零点，用于 planner、MuJoCo dry-run、数据记录和小幅相对轨迹开发。
  not_for: 临床零点、最终机械零位、穿戴运动许可、绕过 M33 的直接执行。

baseline:
  zero_policy: current_power_on_pose_as_engineering_zero
  observation_time: 2026-06-17
  source_topics:
    - /joint_states
    - /rehab_arm/motor_state
    - /rehab_arm/safety_state
  observed_joint_states:
    shoulder_lift_joint:
      observed_position_rad: 0.067
      source: /joint_states
      note: 2026-06-17 NanoPi 只读采样；作为当前工程零点样例。

temporary_rules:
  planner_frame: relative_to_engineering_zero
  allow_cartesian_planning: false
  allow_large_absolute_targets: false
  allow_real_execution_without_m33: false
  final_execution_authority: M33

