<!DOCTYPE HTML>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Harvest Moon Phaser 3 Game</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      canvas {
        display: block;
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
        object-fit: fill;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      .topbar {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .chip-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .chip,
      .hint,
      .legend,
      .drawer,
      .zone,
      .debug {
        pointer-events: auto;
      }

      .chip,
      .hint {
        display: inline-flex;
        min-height: 32px;
        align-items: center;
        padding: 0 11px;
        border-radius: 999px;
        background: rgba(8, 10, 14, 0.76);
        color: #fff4de;
        font-size: 11px;
        font-weight: 700;
        backdrop-filter: blur(8px);
      }

      .zones {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .entities {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .zone {
        position: absolute;
        display: none;
        border-radius: 18px;
        background: rgba(255, 77, 151, 0.14);
        box-shadow:
          inset 0 0 0 2px rgba(255, 102, 173, 0.9),
          0 0 0 1px rgba(37, 6, 22, 0.18);
        overflow: hidden;
      }

      .zone.visible {
        display: block;
      }

      .zone::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 14px;
        border: 1px dashed rgba(255, 210, 231, 0.24);
        opacity: 0.7;
      }

      .zone::after {
        content: attr(data-label);
        position: absolute;
        left: 8px;
        top: 8px;
        display: inline-flex;
        min-height: 22px;
        align-items: center;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(35, 10, 23, 0.82);
        color: #fff4de;
        font-size: 11px;
        font-weight: 800;
        white-space: nowrap;
      }

      .zone-badge {
        position: absolute;
        right: 10px;
        top: 10px;
        width: 34px;
        height: 34px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(35, 10, 23, 0.84);
        color: #fff4de;
        font-size: 14px;
        font-weight: 900;
        box-shadow:
          inset 0 0 0 1px rgba(255, 187, 220, 0.18),
          0 10px 24px rgba(0, 0, 0, 0.18);
      }

      .zone-corners {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .zone-corners span {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 230, 239, 0.88);
        box-shadow: 0 0 12px rgba(255, 132, 188, 0.3);
      }

      .zone-corners span:nth-child(1) { left: 10px; bottom: 10px; }
      .zone-corners span:nth-child(2) { right: 10px; bottom: 10px; }

      .zone-props {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.95;
      }

      .zone-props span {
        position: absolute;
        display: block;
      }

        content: "";

        function clampValue(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function buildPreviewParts() {
          if (!TRAVEL.scene || !SCENES[TRAVEL.scene] || !SCENE_BOUNDS[TRAVEL.scene]) return null;

          const bounds = SCENE_BOUNDS[TRAVEL.scene];
          const viewportWidth = 1280;
          const viewportHeight = 960;
          const playerX = isFiniteNumber(TRAVEL.x) ? TRAVEL.x : bounds.width / 2;
          const playerY = isFiniteNumber(TRAVEL.y) ? TRAVEL.y : bounds.height / 2;
          const viewX = clampValue(playerX - viewportWidth / 2, 0, Math.max(bounds.width - viewportWidth, 0));
          const viewY = clampValue(playerY - viewportHeight / 2, 0, Math.max(bounds.height - viewportHeight, 0));

          return {
            scene: null,
            map: { key: TRAVEL.scene },
            player: { x: playerX, y: playerY },
            camera: {
              width: viewportWidth,
              height: viewportHeight,
              centerOn: function () {},
              worldView: { x: viewX, y: viewY },
            },
            isPreview: true,
          };
        }

        function extractParts(game) {
          try {
            const sceneKeys = game && game.scene && game.scene.keys ? Object.keys(game.scene.keys) : [];
            for (let i = 0; i < sceneKeys.length; i += 1) {
              const scene = game.scene.keys[sceneKeys[i]];
              const camera = scene && scene.cameras && scene.cameras.main;
              const player = scene && scene._PLAYER;
              const map = scene && scene._MAP;
              const hasPlayerApi = !!(player && typeof player.setPosition === "function" && Number.isFinite(player.x) && Number.isFinite(player.y));
              const hasCameraApi = !!(camera && camera.worldView && Number.isFinite(camera.worldView.x) && Number.isFinite(camera.worldView.y));
              const hasMapApi = !!(map && typeof map.key === "string");
              if (scene && hasCameraApi && hasPlayerApi && hasMapApi) {
                return { scene: scene, camera: camera, player: player, map: map };
              }
            }
            return null;
          } catch (error) {
            return null;
          }
        }

        function triggerAutoStart() {
          const enterEvent = new KeyboardEvent("keydown", { key: "Enter", code: "Enter", bubbles: true });
          window.dispatchEvent(enterEvent);
          document.dispatchEvent(enterEvent);
          if (document.body) {
            document.body.dispatchEvent(enterEvent);
          }
        }

        function findGameInWindow() {
          if (window.Phaser && Array.isArray(window.Phaser.GAMES) && window.Phaser.GAMES.length) {
            return window.Phaser.GAMES[0];
          }

          const keys = Object.keys(window);
          for (let i = 0; i < keys.length; i += 1) {
            const candidate = window[keys[i]];
            if (candidate && extractParts(candidate)) {
              return candidate;
            }
          }

          if (window.parcelRequire && window.parcelRequire.cache) {
            const cache = window.parcelRequire.cache;
            const ids = Object.keys(cache);
            for (let i = 0; i < ids.length; i += 1) {
              const entry = cache[ids[i]];
              const exported = entry && entry.exports;
              if (exported && extractParts(exported)) {
                return exported;
              }
              if (exported && exported.default && extractParts(exported.default)) {
                return exported.default;
              }
            }
          }

          return null;
        }

        function getGameParts() {
          if (cachedGame) {
            const parts = extractParts(cachedGame);
            if (parts) return parts;
          }

          const found = findGameInWindow();
          if (!found) return null;
          cachedGame = found;
          return extractParts(found);
        }

          const found = findGameInWindow();
          if (!found) {
            lines.push("found: none");
            return lines.join("\n");

          if (found.scene && found.scene.keys) {
            const sceneNames = Object.keys(found.scene.keys);
            lines.push("found scenes: " + sceneNames.join(", "));
            sceneNames.forEach(function (name) {
              const scene = found.scene.keys[name];
              lines.push(name + " player=" + !!(scene && scene._PLAYER) + " map=" + !!(scene && scene._MAP));

          }

          return lines.join("\n");
        }

        function isFiniteNumber(value) {
          return Number.isFinite(value);
        }

        function isSceneConfigCandidate(value) {
          return !!(
            value &&
            typeof value === "object" &&
            typeof value.loadedScene === "string" &&
            value.map &&
            value.map.sceneFarm &&
            value.map.sceneFarm.key === "map-farm"
          );
        }

        function findSceneConfigObject(root, seen, depth) {
          if (!root || typeof root !== "object") return null;
          if (seen.has(root) || depth > 3) return null;
          seen.add(root);

          if (isSceneConfigCandidate(root)) {
            return root;
          }

          const keys = Object.keys(root);
          for (let i = 0; i < keys.length; i += 1) {
            const next = root[keys[i]];
            const found = findSceneConfigObject(next, seen, depth + 1);
            if (found) return found;
          }

          return null;
        }

        function getRuntimeSceneConfig() {
          const seen = new WeakSet();

          const fromWindow = findSceneConfigObject(window, seen, 0);
          if (fromWindow) return fromWindow;

          if (window.parcelRequire && window.parcelRequire.cache) {
            const ids = Object.keys(window.parcelRequire.cache);
            for (let i = 0; i < ids.length; i += 1) {
              const entry = window.parcelRequire.cache[ids[i]];
              const exported = entry && entry.exports;
              const found = findSceneConfigObject(exported, seen, 0);
              if (found) return found;
            }
          }

          return null;
        }

        function applyTravel(parts) {
          if (travelApplied) return;
          if (!parts) return;

          const sceneLookup = {
            "map-farm": "sceneFarm",
            "map-home": "sceneHome",
            "map-coop": "sceneCoop",
            "map-toolshed": "sceneToolShed",
            "map-cowshed": "sceneCowShed",
            "map-crossroads": "sceneCrossRoads",
          };

          if (TRAVEL.scene && TRAVEL.scene !== parts.map.key) {
            const nextScene = sceneLookup[TRAVEL.scene];
            if (nextScene && parts.scene && parts.scene._OBJECTS && typeof parts.scene._OBJECTS.newScene === "function") {
              travelDebug = "via object loader -> " + nextScene;
              parts.scene._OBJECTS.newScene(nextScene);
              return;
            }

            if (nextScene) {
              const runtimeConfig = getRuntimeSceneConfig();
              if (runtimeConfig) {
                travelDebug = "via runtime config " + runtimeConfig.loadedScene + " -> " + nextScene;
                runtimeConfig.previousData = runtimeConfig.previousData || {};
                runtimeConfig.previousData.scene = runtimeConfig.loadedScene;
                runtimeConfig.loadedScene = nextScene;
                if (parts.scene && parts.scene.scene && typeof parts.scene.scene.restart === "function") {
                  travelDebug += " restart";
                  parts.scene.scene.restart();
                }
                return;
              }
              travelDebug = "no runtime config for " + nextScene;
            }
            return;
          }

          if (!isFiniteNumber(TRAVEL.x) || !isFiniteNumber(TRAVEL.y)) {
            travelApplied = true;
            return;
          }

          if (!parts.player || typeof parts.player.setPosition !== "function") {
            travelDebug = "player api unavailable";
            return;
          }

          parts.player.setPosition(TRAVEL.x, TRAVEL.y);
          if (parts.player.body && typeof parts.player.body.reset === "function") {
            parts.player.body.reset(TRAVEL.x, TRAVEL.y);
          }
          if (parts.camera && typeof parts.camera.centerOn === "function") {
            parts.camera.centerOn(TRAVEL.x, TRAVEL.y);
          }
          travelApplied = true;
        }

        function setActive(id) {
          activeId = id;
          zoneNodes.forEach(function (node, key) {

          });
          const zone = (SCENES[currentSceneKey] || []).find(function (item) {

          }) || null;

        function toggleActive(id) {
          if (!id) return;
          if (activeId === id) {
            activeId = null;
            zoneNodes.forEach(function (node) {
              node.classList.remove("active");
            });
            legend.querySelectorAll("button").forEach(function (button) {
              button.classList.remove("active");

            renderDrawer(null);

          }
          setActive(id);
        }

          focusedId = id;
          zoneNodes.forEach(function (node, key) {

          });

        function distanceToRect(px, py, rect) {
          const dx = Math.max(rect.x - px, 0, px - (rect.x + rect.w));
          const dy = Math.max(rect.y - py, 0, py - (rect.y + rect.h));
          return Math.sqrt((dx * dx) + (dy * dy));
        }

        function ensureSceneUi(sceneKey) {
          if (sceneKey === currentSceneKey) return;
          currentSceneKey = sceneKey;
          sceneChip.textContent = sceneKey ? ("当前场景：" + sceneKey) : "等待游戏场景";
          zoneNodes.clear();
          zonesRoot.innerHTML = "";

          const zones = SCENES[sceneKey] || [];
          zones.forEach(function (zone) {
            const visualMeta = getZoneVisualMeta(zone.id);

              '<div class="zone-corners"><span></span><span></span></div>';

              toggleActive(zone.id);

        function ensureEntityNodes() {
          const entities = getWorldEntities();
          const ids = entities.map(function (item) { return item.id; });
          if (dirtyEntities || entityNodes.size !== entities.length) {
            entityNodes.clear();
            entitiesRoot.innerHTML = "";
          }
          if (entityNodes.size) return entities;
          entities.forEach(function (entity) {
            const node = document.createElement("div");
            node.className = "entity " + entity.kind + (entity.layout ? (" " + entity.layout) : "");
            node.dataset.id = entity.id;
            node.innerHTML = entity.render();
            entitiesRoot.appendChild(node);
            entityNodes.set(entity.id, node);
          });
          dirtyEntities = false;
          return entities;
        }

        function updateEntities(sceneKey, camera, tick) {
          const entities = ensureEntityNodes();
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;
          const drawerWidth = drawer ? drawer.offsetWidth : 0;
          const drawerLeft = drawerWidth ? (window.innerWidth - drawerWidth) : window.innerWidth;

          entities.forEach(function (entity) {
            const node = entityNodes.get(entity.id);
            if (!node) return;
            if (entity.scene !== sceneKey) {
              node.classList.remove("visible");
              return;
            }

            const pos = entity.getPosition(tick);
            const left = (pos.x - viewX) * scaleX;
            const top = (pos.y - viewY) * scaleY;
            let visible = !(left < -120 || top < -80 || left > window.innerWidth + 120 || top > window.innerHeight + 80);
            if (visible && left < 210 && top < 150) visible = false;
            if (visible && left > drawerLeft - 36) visible = false;
            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
            }
          });
        }

          }
          if (zoneId === "build-bench" || zoneId === "release-crate" || zoneId === "delivery" || zoneId === "delivery-room") {
            sections.push('<div class="drawer-section"><h3>交付回执</h3>' + renderPills(MULTIPLAYER_STATE.deliveries, function (item) { return item.title + " · " + item.status; }, "暂无交付") + "</div>");
          }
          if (zoneId === "approvals" || zoneId === "device-rack" || zoneId === "build-bench") {
            sections.push('<div class="drawer-section"><h3>审批队列</h3>' + renderPills(MULTIPLAYER_STATE.approvals, function (item) { return item.title + " · " + item.status; }, "暂无审批") + "</div>");
          }

          return sections.join("");
        }

        function updateOverlay() {
          if (AUTO_START && !autoStartDone && autoStartTries < 80) {
            autoStartTries += 1;
            triggerAutoStart();
          }

          let parts = getGameParts();
          if (!parts) {
            const previewParts = buildPreviewParts();
            if (!previewParts) {
              sceneChip.textContent = "等待游戏场景";
              focusChip.textContent = "靠近粉色框后按 Enter";
              debug.textContent = "等待 Phaser 场景加载\n" + describeGameSearch();
              return;
            }
            parts = previewParts;
            travelDebug = "preview fallback -> " + parts.map.key;
          }

          if (!parts.isPreview) {
            autoStartDone = true;
            applyTravel(parts);
          }

          const sceneKey = parts.map.key;
          ensureSceneUi(sceneKey);
          const presetZone = TRAVEL.focus ? (SCENES[sceneKey] || []).find(function (item) {
            return item.id === TRAVEL.focus;
          }) : null;
          if (presetZone && !activeId) {
            setFocused(presetZone.id);
          }
          updateEntities(sceneKey, parts.camera, performance.now() / 1000);

          const zones = SCENES[sceneKey] || [];
          const camera = parts.camera;
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;
          const viewW = camera.width;
          const viewH = camera.height;
          const playerX = parts.player.x;
          const playerY = parts.player.y;
          let nearest = null;

          zones.forEach(function (zone) {
            const node = zoneNodes.get(zone.id);
            if (!node) return;

            const left = (zone.rect.x - viewX) * scaleX;
            const top = (zone.rect.y - viewY) * scaleY;
            const width = zone.rect.w * scaleX;
            const height = zone.rect.h * scaleY;
            const visible = !(left + width < -24 || top + height < -24 || left > window.innerWidth + 24 || top > window.innerHeight + 24);

            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
              node.style.width = width + "px";
              node.style.height = height + "px";
            }

            const dist = distanceToRect(playerX, playerY, zone.rect);
            if (!nearest || dist < nearest.dist) {
              nearest = { id: zone.id, dist: dist };
            }
          });

          if (presetZone && !activeId) {
            setFocused(presetZone.id);
            focusChip.textContent = "Enter 打开：" + presetZone.label;
          } else if (nearest && nearest.dist <= 170) {
            const zone = zones.find(function (item) {
              return item.id === nearest.id;
            });
            setFocused(nearest.id);
            focusChip.textContent = "Enter 打开：" + (zone ? zone.label : nearest.id);
          } else {
            setFocused(null);
            focusChip.textContent = "靠近粉色框后按 Enter";
            if (!activeId) {
              renderDrawer(null);
            }
          }

          const playerTextX = isFiniteNumber(playerX) ? playerX.toFixed(1) : "n/a";
          const playerTextY = isFiniteNumber(playerY) ? playerY.toFixed(1) : "n/a";
          const cameraTextX = isFiniteNumber(viewX) ? viewX.toFixed(1) : "n/a";
          const cameraTextY = isFiniteNumber(viewY) ? viewY.toFixed(1) : "n/a";

          debug.textContent = [
            "scene: " + sceneKey,
            "player: " + playerTextX + ", " + playerTextY,
            "camera: " + cameraTextX + ", " + cameraTextY + " / " + viewW + "x" + viewH,
            "focus: " + (focusedId || "none"),
            "active: " + (activeId || "none"),
            "travel: " + (isFiniteNumber(TRAVEL.x) && isFiniteNumber(TRAVEL.y) ? (TRAVEL.x + ", " + TRAVEL.y) : "off"),
            "sceneTarget: " + (TRAVEL.scene || "off"),
            "travelDebug: " + travelDebug,
          ].join("\n");
        }

        window.addEventListener("keydown", function (event) {
          if (event.key === "Enter" && focusedId) {
            toggleActive(focusedId);
          }
        });

        drawer.addEventListener("click", function (event) {
          const target = event.target.closest("button[data-action]");
          if (!target) return;
          handleAction(target.dataset.action);
        });

        window.setInterval(updateOverlay, 120);
        renderDrawer(null);
      })();
    </script>
  </body>
</html>
