<!DOCTYPE HTML>
<html lang="zh-CN">
  <head>

    <title>Harvest Moon Phaser 3 Game</title>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      canvas {
        display: block;
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
        object-fit: fill;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      .topbar {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: 10px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .chip-stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .chip,
      .hint,
      .legend,
      .drawer,
      .zone,
      .debug {
        pointer-events: auto;
      }

      .chip,
      .hint {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(8, 10, 14, 0.76);
        color: #fff4de;
        font-size: 12px;
        font-weight: 700;
        backdrop-filter: blur(8px);
      }

      .zones {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .entities {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .zone {
        position: absolute;
        display: none;
        border-radius: 18px;
        background: rgba(255, 77, 151, 0.14);
        box-shadow:
          inset 0 0 0 2px rgba(255, 102, 173, 0.9),
          0 0 0 1px rgba(37, 6, 22, 0.18);
      }

      .zone.visible {
        display: block;
      }

      .zone::after {
        content: attr(data-label);
        position: absolute;
        left: 8px;
        top: 8px;
        display: inline-flex;
        min-height: 22px;
        align-items: center;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(35, 10, 23, 0.82);
        color: #fff4de;
        font-size: 11px;
        font-weight: 800;
        white-space: nowrap;
      }

      .entity {
        position: absolute;
        display: none;
        pointer-events: none;
      }

      .entity.visible {
        display: block;
      }

      .entity-badge {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(22, 17, 10, 0.88);
        color: #fff4de;
        font-size: 12px;
        font-weight: 800;
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
      }

      .entity.player .entity-badge {
        background: rgba(28, 40, 18, 0.9);
      }

      .entity.task .entity-badge {
        background: rgba(76, 25, 18, 0.9);
      }

      .entity.computer .entity-badge {
        background: rgba(18, 30, 50, 0.92);
      }

      .entity.ai-codex .entity-badge {
        background: rgba(107, 56, 10, 0.92);
      }

      .entity.ai-claude .entity-badge {
        background: rgba(74, 42, 18, 0.92);
      }

      .entity-home {
        width: 34px;
        height: 24px;
        margin: 6px auto 0;
        border-radius: 8px 8px 4px 4px;
        background: rgba(194, 137, 80, 0.9);
        box-shadow:
          inset 0 -4px 0 rgba(101, 49, 20, 0.45),
          0 8px 18px rgba(0, 0, 0, 0.16);
      }

      .entity-home::before {
        content: "";
        display: block;
        width: 24px;
        height: 10px;
        margin: -6px auto 0;
        border-radius: 6px 6px 0 0;
        background: rgba(112, 37, 19, 0.95);
      }

      .zone.focused {
        background: rgba(255, 77, 151, 0.22);
        box-shadow:
          inset 0 0 0 3px rgba(255, 192, 221, 1),
          0 0 28px rgba(255, 77, 151, 0.28);
      }

      .zone.active {
        background: rgba(255, 77, 151, 0.28);
        box-shadow:
          inset 0 0 0 3px rgba(255, 214, 232, 1),
          0 0 34px rgba(255, 77, 151, 0.35);
      }

      .drawer {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        right: 12px;
        width: min(390px, calc(100vw - 24px));
        max-height: calc(100vh - 132px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
        overflow: auto;
        padding: 16px;
        border-radius: 24px;
        background: rgba(8, 10, 14, 0.9);
        color: #fff4de;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        display: inline-flex;
        min-height: 24px;
        align-items: center;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(255, 132, 188, 0.92);
        color: #31091b;
        font-size: 11px;
        font-weight: 800;
      }

      .drawer h2 {
        margin: 10px 0 0;
        font-size: 28px;
        line-height: 1.06;
      }

      .drawer p {
        margin: 10px 0 0;
        color: rgba(255, 244, 222, 0.8);
        font-size: 13px;
        line-height: 1.55;
      }

      .drawer ul {
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .drawer-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .drawer-actions button {
        border: 0;
        min-height: 40px;
        padding: 0 12px;
        border-radius: 14px;
        background: rgba(255, 132, 188, 0.92);
        color: #31091b;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .drawer-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .drawer-stats div {
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 244, 222, 0.92);
        font-size: 12px;
        line-height: 1.45;
      }

      .drawer-section {
        margin-top: 14px;
      }

      .drawer-section h3 {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(255, 244, 222, 0.68);
      }

      .drawer-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .drawer-pills span {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 244, 222, 0.92);
        font-size: 12px;
        font-weight: 700;
      }

      .drawer li {
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 244, 222, 0.92);
        font-size: 13px;
        line-height: 1.45;
      }

      .legend {
        position: absolute;
        right: 12px;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        width: min(560px, calc(100vw - 24px));
      }

      .legend button {
        border: 0;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(8, 10, 14, 0.76);
        color: #fff4de;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .legend button.active {
        background: #ff84bc;
        color: #31091b;
      }

      .hint {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
        max-width: calc(100vw - 24px);
        text-align: center;
      }

      .debug {
        position: absolute;
        left: 10px;
        top: calc(env(safe-area-inset-top, 0px) + 136px);
        max-width: min(480px, calc(100vw - 24px));
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(8, 10, 14, 0.76);
        color: #fff4de;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        backdrop-filter: blur(8px);
      }

      @media (max-width: 760px) {
        .topbar {
          flex-direction: column;
        }

        .drawer {
          top: auto;
          right: 10px;
          left: 10px;
          bottom: 92px;
          width: auto;
          max-height: 44vh;
        }

        .legend {
          left: 10px;
          right: 10px;
          width: auto;
          justify-content: flex-start;
          bottom: 52px;
        }
      }
    </style>

    <script>

        const debug = document.getElementById("debug");
        const search = new URLSearchParams(window.location.search);

        const STORAGE_KEY = "farm-game-state-v2";
        const DEFAULT_STATE = {
          collaborators: [
            { id: "p1", name: "阿城", role: "嵌入式", scene: "map-farm", path: [{ x: 760, y: 1700 }, { x: 1210, y: 1240 }, { x: 1930, y: 1820 }, { x: 2090, y: 2400 }] },

            { id: "a1", model: "Codex", species: "鸡", scene: "map-farm", x: 2215, y: 1785, type: "codex" },

          deliveries: [

          ],
        };

        function cloneState(value) {
          return JSON.parse(JSON.stringify(value));
        }

        function loadState() {
          try {
            const raw = window.localStorage.getItem(STORAGE_KEY);
            if (!raw) return cloneState(DEFAULT_STATE);
            return Object.assign(cloneState(DEFAULT_STATE), JSON.parse(raw));
          } catch (error) {
            return cloneState(DEFAULT_STATE);
          }
        }

        const MULTIPLAYER_STATE = loadState();

        const TASK_STAGE_LABELS = {
          empty: "空田",
          seed: "播种",
          sprout: "发芽",
          grow: "成长",
          ready: "可收获",

        const TASK_STATUS_FLOW = {

          "联调中": "待交付",

        function normalizeState() {
          MULTIPLAYER_STATE.collaborators = Array.isArray(MULTIPLAYER_STATE.collaborators) ? MULTIPLAYER_STATE.collaborators : [];
          MULTIPLAYER_STATE.tasks = Array.isArray(MULTIPLAYER_STATE.tasks) ? MULTIPLAYER_STATE.tasks : [];

          MULTIPLAYER_STATE.approvals = Array.isArray(MULTIPLAYER_STATE.approvals) ? MULTIPLAYER_STATE.approvals : [];
          MULTIPLAYER_STATE.deliveries = Array.isArray(MULTIPLAYER_STATE.deliveries) ? MULTIPLAYER_STATE.deliveries : [];
          MULTIPLAYER_STATE.taskPlots = Array.isArray(MULTIPLAYER_STATE.taskPlots) ? MULTIPLAYER_STATE.taskPlots : [

          ];
          MULTIPLAYER_STATE.story = MULTIPLAYER_STATE.story || { current: "接入第一只 AI 动物并照料它", completed: [] };

          MULTIPLAYER_STATE.collaborators.forEach(function (item, index) {
            item.name = item.name || ("协作者" + (index + 1));
            item.role = item.role || "研发";
          });

          MULTIPLAYER_STATE.tasks.forEach(function (item, index) {
            item.label = item.label || ("任务 " + (index + 1));
            item.status = item.status || "待执行";
            item.scene = item.scene || "map-farm";
          });

          MULTIPLAYER_STATE.agents.forEach(function (item, index) {
            item.model = item.model || (item.type === "claude" ? "Claude" : "Codex");
            item.species = item.species || (item.type === "claude" ? "牛" : "鸡");
            item.type = item.type || (item.model === "Claude" ? "claude" : "codex");
            item.scene = item.scene || "map-farm";
            item.fedToday = Boolean(item.fedToday);
            item.talkedToday = Boolean(item.talkedToday);
            item.mood = item.mood || (item.fedToday && item.talkedToday ? "状态稳定" : "待照料");
            if (!Number.isFinite(item.x)) {
              item.x = item.type === "claude" ? 1605 + (index * 42) : 2215 + (index * 32);
            }
            if (!Number.isFinite(item.y)) {
              item.y = item.type === "claude" ? 1755 + ((index % 2) * 36) : 1785 + ((index % 2) * 26);
            }
          });

          MULTIPLAYER_STATE.taskPlots.forEach(function (plot, index) {
            plot.id = plot.id || ("plot" + (index + 1));
            plot.title = plot.title || "空田块";
            plot.stage = plot.stage || "empty";
            plot.progress = Number.isFinite(plot.progress) ? plot.progress : 0;
            plot.scene = plot.scene || "map-farm";
          });
        }

        function extractParts(game) {
          try {
            const sceneKeys = game && game.scene && game.scene.keys ? Object.keys(game.scene.keys) : [];
            for (let i = 0; i < sceneKeys.length; i += 1) {
              const scene = game.scene.keys[sceneKeys[i]];
              const camera = scene && scene.cameras && scene.cameras.main;
              const player = scene && scene._PLAYER;
              const map = scene && scene._MAP;
              if (scene && camera && player && map) {
                return { scene: scene, camera: camera, player: player, map: map };
              }
            }
            return null;
          } catch (error) {
            return null;
          }
        }

        function triggerAutoStart() {
          const enterEvent = new KeyboardEvent("keydown", { key: "Enter", code: "Enter", bubbles: true });
          window.dispatchEvent(enterEvent);
          document.dispatchEvent(enterEvent);
          if (document.body) {
            document.body.dispatchEvent(enterEvent);
          }
        }

        function findGameInWindow() {
          if (window.Phaser && Array.isArray(window.Phaser.GAMES) && window.Phaser.GAMES.length) {
            return window.Phaser.GAMES[0];
          }

          const keys = Object.keys(window);
          for (let i = 0; i < keys.length; i += 1) {
            const candidate = window[keys[i]];
            if (candidate && extractParts(candidate)) {
              return candidate;
            }
          }

          if (window.parcelRequire && window.parcelRequire.cache) {
            const cache = window.parcelRequire.cache;
            const ids = Object.keys(cache);
            for (let i = 0; i < ids.length; i += 1) {
              const entry = cache[ids[i]];
              const exported = entry && entry.exports;
              if (exported && extractParts(exported)) {
                return exported;
              }
              if (exported && exported.default && extractParts(exported.default)) {
                return exported.default;
              }
            }
          }

          return null;
        }

        function getGameParts() {
          if (cachedGame) {
            const parts = extractParts(cachedGame);
            if (parts) return parts;
          }

          const found = findGameInWindow();
          if (!found) return null;
          cachedGame = found;
          return extractParts(found);
        }

        function describeGameSearch() {
          const lines = [];

          if (cachedGame && cachedGame.scene && cachedGame.scene.keys) {
            lines.push("cached scenes: " + Object.keys(cachedGame.scene.keys).join(", "));

          const found = findGameInWindow();
          if (!found) {
            lines.push("found: none");
            return lines.join("\n");
          }

          if (found.scene && found.scene.keys) {
            const sceneNames = Object.keys(found.scene.keys);
            lines.push("found scenes: " + sceneNames.join(", "));
            sceneNames.forEach(function (name) {
              const scene = found.scene.keys[name];
              lines.push(name + " player=" + !!(scene && scene._PLAYER) + " map=" + !!(scene && scene._MAP));
            });
          }

          return lines.join("\n");
        }

        function isFiniteNumber(value) {

        function isSceneConfigCandidate(value) {
          return !!(
            value &&
            typeof value === "object" &&
            typeof value.loadedScene === "string" &&
            value.map &&
            value.map.sceneFarm &&
            value.map.sceneFarm.key === "map-farm"
          );
        }

        function findSceneConfigObject(root, seen, depth) {
          if (!root || typeof root !== "object") return null;
          if (seen.has(root) || depth > 3) return null;
          seen.add(root);

          if (isSceneConfigCandidate(root)) {
            return root;
          }

          const keys = Object.keys(root);
          for (let i = 0; i < keys.length; i += 1) {
            const next = root[keys[i]];
            const found = findSceneConfigObject(next, seen, depth + 1);
            if (found) return found;
          }

          return null;
        }

        function getRuntimeSceneConfig() {
          const seen = new WeakSet();

          const fromWindow = findSceneConfigObject(window, seen, 0);
          if (fromWindow) return fromWindow;

          if (window.parcelRequire && window.parcelRequire.cache) {
            const ids = Object.keys(window.parcelRequire.cache);
            for (let i = 0; i < ids.length; i += 1) {
              const entry = window.parcelRequire.cache[ids[i]];
              const exported = entry && entry.exports;
              const found = findSceneConfigObject(exported, seen, 0);
              if (found) return found;
            }
          }

          return null;
        }

        function applyTravel(parts) {
          if (travelApplied) return;
          if (!parts) return;

          const sceneLookup = {
            "map-farm": "sceneFarm",
            "map-home": "sceneHome",
            "map-coop": "sceneCoop",
            "map-toolshed": "sceneToolShed",
            "map-cowshed": "sceneCowShed",
            "map-crossroads": "sceneCrossRoads",
          };

          if (TRAVEL.scene && TRAVEL.scene !== parts.map.key) {
            const nextScene = sceneLookup[TRAVEL.scene];
            if (nextScene && parts.scene && parts.scene._OBJECTS && typeof parts.scene._OBJECTS.newScene === "function") {
              travelDebug = "via object loader -> " + nextScene;
              parts.scene._OBJECTS.newScene(nextScene);
              return;
            }

            if (nextScene) {
              const runtimeConfig = getRuntimeSceneConfig();
              if (runtimeConfig) {
                travelDebug = "via runtime config " + runtimeConfig.loadedScene + " -> " + nextScene;
                runtimeConfig.previousData = runtimeConfig.previousData || {};
                runtimeConfig.previousData.scene = runtimeConfig.loadedScene;
                runtimeConfig.loadedScene = nextScene;
                if (parts.scene && parts.scene.scene && typeof parts.scene.scene.restart === "function") {
                  travelDebug += " restart";
                  parts.scene.scene.restart();
                }
                return;
              }
              travelDebug = "no runtime config for " + nextScene;
            }
            return;
          }

          if (!isFiniteNumber(TRAVEL.x) || !isFiniteNumber(TRAVEL.y)) {
            travelApplied = true;
            return;
          }

          parts.player.setPosition(TRAVEL.x, TRAVEL.y);
          if (parts.player.body && typeof parts.player.body.reset === "function") {
            parts.player.body.reset(TRAVEL.x, TRAVEL.y);
          }
          parts.camera.centerOn(TRAVEL.x, TRAVEL.y);
          travelApplied = true;
        }

        function distanceToRect(px, py, rect) {
          const dx = Math.max(rect.x - px, 0, px - (rect.x + rect.w));
          const dy = Math.max(rect.y - py, 0, py - (rect.y + rect.h));
          return Math.sqrt((dx * dx) + (dy * dy));
        }

            zoneNodes.set(zone.id, node);

            button.type = "button";
            button.dataset.id = zone.id;
            button.textContent = zone.label;
            button.addEventListener("click", function () {

        function ensureEntityNodes() {
          const entities = getWorldEntities();
          const ids = entities.map(function (item) { return item.id; });
          if (dirtyEntities || entityNodes.size !== entities.length) {
            entityNodes.clear();
            entitiesRoot.innerHTML = "";
          }
          if (entityNodes.size) return entities;
          entities.forEach(function (entity) {
            const node = document.createElement("div");
            node.className = "entity " + entity.kind;
            node.dataset.id = entity.id;
            node.innerHTML = entity.render();
            entitiesRoot.appendChild(node);
            entityNodes.set(entity.id, node);
          });
          dirtyEntities = false;
          return entities;
        }

        function updateEntities(sceneKey, camera, tick) {
          const entities = ensureEntityNodes();
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;

          entities.forEach(function (entity) {
            const node = entityNodes.get(entity.id);
            if (!node) return;
            if (entity.scene !== sceneKey) {
              node.classList.remove("visible");
              return;
            }

            const pos = entity.getPosition(tick);
            const left = (pos.x - viewX) * scaleX;
            const top = (pos.y - viewY) * scaleY;
            const visible = !(left < -120 || top < -80 || left > window.innerWidth + 120 || top > window.innerHeight + 80);
            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
            }
          });
        }

            return;
          }

          autoStartDone = true;
          applyTravel(parts);

          const sceneKey = parts.map.key;
          ensureSceneUi(sceneKey);
          updateEntities(sceneKey, parts.camera, performance.now() / 1000);

          const zones = SCENES[sceneKey] || [];
          const camera = parts.camera;
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;
          const viewW = camera.width;
          const viewH = camera.height;
          const playerX = parts.player.x;
          const playerY = parts.player.y;
          let nearest = null;

          zones.forEach(function (zone) {
            const node = zoneNodes.get(zone.id);
            if (!node) return;

            const left = (zone.rect.x - viewX) * scaleX;
            const top = (zone.rect.y - viewY) * scaleY;
            const width = zone.rect.w * scaleX;
            const height = zone.rect.h * scaleY;
            const visible = !(left + width < -24 || top + height < -24 || left > window.innerWidth + 24 || top > window.innerHeight + 24);

            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
              node.style.width = width + "px";
              node.style.height = height + "px";
            }

            const dist = distanceToRect(playerX, playerY, zone.rect);
            if (!nearest || dist < nearest.dist) {
              nearest = { id: zone.id, dist: dist };
            }
          });

          if (nearest && nearest.dist <= 170) {
            const zone = zones.find(function (item) {
              return item.id === nearest.id;
            });
            setFocused(nearest.id);
            focusChip.textContent = "Enter 打开：" + (zone ? zone.label : nearest.id);
          } else {
            setFocused(null);
            focusChip.textContent = "靠近粉色框后按 Enter";
          }

          debug.textContent = [
            "scene: " + sceneKey,
            "player: " + playerX.toFixed(1) + ", " + playerY.toFixed(1),
            "camera: " + viewX.toFixed(1) + ", " + viewY.toFixed(1) + " / " + viewW + "x" + viewH,
            "focus: " + (focusedId || "none"),
            "active: " + (activeId || "none"),
            "travel: " + (isFiniteNumber(TRAVEL.x) && isFiniteNumber(TRAVEL.y) ? (TRAVEL.x + ", " + TRAVEL.y) : "off"),
            "sceneTarget: " + (TRAVEL.scene || "off"),
            "travelDebug: " + travelDebug,
          ].join("\n");
        }

        window.addEventListener("keydown", function (event) {
          if (event.key === "Enter" && focusedId) {
            setActive(focusedId);
          }
        });

        drawer.addEventListener("click", function (event) {
          const target = event.target.closest("button[data-action]");
          if (!target) return;
          handleAction(target.dataset.action);
        });

        window.setInterval(updateOverlay, 120);
        renderDrawer(null);
      })();
    </script>
  </body>
</html>
