        font-size: 12px;
        font-weight: 700;
        backdrop-filter: blur(8px);

        inset: 0;
        pointer-events: none;

        inset: 0;
        pointer-events: none;

        box-shadow:

      .zone.visible {
        display: block;
      }

        content: attr(data-label);
        position: absolute;
        left: 8px;
        top: 8px;
        display: inline-flex;
        min-height: 22px;
        align-items: center;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(35, 10, 23, 0.82);
        color: #fff4de;
        font-size: 11px;
        font-weight: 800;
        white-space: nowrap;
      }

      .entity {
        position: absolute;
        display: none;
        pointer-events: none;
      }

        display: block;
      }

        function extractParts(game) {
          try {
            const scene = game.scene && game.scene.keys && game.scene.keys.Game;
            const camera = scene && scene.cameras && scene.cameras.main;
            const player = scene && scene._PLAYER;
            const map = scene && scene._MAP;
            if (!scene || !camera || !player || !map) return null;
            return { scene: scene, camera: camera, player: player, map: map };
          } catch (error) {
            return null;
          }
        }

        function findGameInWindow() {
          if (window.Phaser && Array.isArray(window.Phaser.GAMES) && window.Phaser.GAMES.length) {
            return window.Phaser.GAMES[0];
          }

          const keys = Object.keys(window);
          for (let i = 0; i < keys.length; i += 1) {
            const candidate = window[keys[i]];
            if (candidate && extractParts(candidate)) {
              return candidate;
            }
          }

          if (window.parcelRequire && window.parcelRequire.cache) {
            const cache = window.parcelRequire.cache;
            const ids = Object.keys(cache);
            for (let i = 0; i < ids.length; i += 1) {
              const entry = cache[ids[i]];
              const exported = entry && entry.exports;
              if (exported && extractParts(exported)) {
                return exported;
              }
              if (exported && exported.default && extractParts(exported.default)) {
                return exported.default;
              }
            }
          }

          return null;
        }

        function getGameParts() {
          if (cachedGame) {
            const parts = extractParts(cachedGame);
            if (parts) return parts;
          }

          const found = findGameInWindow();
          if (!found) return null;
          cachedGame = found;
          return extractParts(found);
        }

        function saveState() {

        function buildWorldEntities() {
          const entities = [];

          MULTIPLAYER_STATE.collaborators.forEach(function (player) {
            entities.push({

              kind: "player",
              scene: player.scene,
              getPosition: function (tick) {
                const step = Math.floor(tick / 20) % player.path.length;

              },
              render: function () {
                return '<div class="entity-badge">👤 ' + player.name + " · " + player.role + "</div>";
              },
            });
          });

          MULTIPLAYER_STATE.tasks.forEach(function (task) {
            entities.push({
              id: task.id,
              kind: "task",
              scene: task.scene,
              getPosition: function (tick) {
                const step = Math.floor(tick / 28) % task.path.length;
                return task.path[step];
              },
              render: function () {
                return '<div class="entity-badge">任务 · ' + task.label + " · " + task.status + "</div>";
              },
            });
          });

          MULTIPLAYER_STATE.computers.forEach(function (computer) {
            entities.push({
              id: computer.id,
              kind: "computer",
              scene: computer.scene,
              getPosition: function () {
                return { x: computer.x, y: computer.y };
              },
              render: function () {
                return '<div class="entity-badge">电脑 · ' + computer.label + '</div><div class="entity-home"></div>';
              },
            });
          });

          MULTIPLAYER_STATE.agents.forEach(function (agent) {
            entities.push({
              id: agent.id,
              kind: "ai-" + agent.type,
              scene: agent.scene,
              getPosition: function () {
                return { x: agent.x, y: agent.y };
              },
              render: function () {
                return '<div class="entity-badge">' + agent.species + ' · ' + agent.model + "</div>";
              },
            });
          });

          return entities;
        }

        function getWorldEntities() {
          return buildWorldEntities();
        }

        function isFiniteNumber(value) {
          return Number.isFinite(value);
        }

        function applyTravel(parts) {
          if (travelApplied) return;
          if (!parts) return;
          if (TRAVEL.scene && TRAVEL.scene !== parts.map.key) return;
          if (!isFiniteNumber(TRAVEL.x) || !isFiniteNumber(TRAVEL.y)) {
            travelApplied = true;
            return;
          }

          parts.player.setPosition(TRAVEL.x, TRAVEL.y);
          if (parts.player.body && typeof parts.player.body.reset === "function") {
            parts.player.body.reset(TRAVEL.x, TRAVEL.y);
          }
          parts.camera.centerOn(TRAVEL.x, TRAVEL.y);
          travelApplied = true;
        }

        function getStats() {
          const codexCount = MULTIPLAYER_STATE.agents.filter(function (item) { return item.type === "codex"; }).length;
          const claudeCount = MULTIPLAYER_STATE.agents.filter(function (item) { return item.type === "claude"; }).length;
          return {
            tasks: MULTIPLAYER_STATE.tasks.length,
            computers: MULTIPLAYER_STATE.computers.length,
            codex: codexCount,
            claude: claudeCount,
            approvals: MULTIPLAYER_STATE.approvals.length,
            deliveries: MULTIPLAYER_STATE.deliveries.length,
            collaborators: MULTIPLAYER_STATE.collaborators.length,
            requirements: MULTIPLAYER_STATE.requirements.length,
          };
        }

        function getZoneActions(zoneId) {
          if (zoneId === "requirements") return [
            { id: "add-requirement", label: "收 1 条需求" },
            { id: "spawn-task", label: "拆成任务" },
          ];
          if (zoneId === "tasks") return [
            { id: "spawn-task", label: "新增任务" },
            { id: "advance-task", label: "推进任务" },
          ];
          if (zoneId === "computers" || zoneId === "computer-room") return [
            { id: "add-computer", label: "加 1 台电脑" },
            { id: "advance-task", label: "派电脑执行" },
          ];
          if (zoneId === "ai" || zoneId === "chat-room") return [
            { id: "add-codex", label: "接入 Codex 鸡" },
            { id: "add-claude", label: "接入 Claude 牛" },
          ];
          if (zoneId === "delivery" || zoneId === "delivery-room") return [
            { id: "deliver-task", label: "完成 1 个交付" },
            { id: "add-computer", label: "再搭 1 间房" },
          ];
          if (zoneId === "approvals") return [
            { id: "add-approval", label: "发起审批" },
            { id: "resolve-approval", label: "通过审批" },
          ];
          if (zoneId === "chat" || zoneId === "project") return [
            { id: "add-collaborator", label: "加入协作者" },
            { id: "spawn-task", label: "派 1 个任务" },
          ];
          return [
            { id: "spawn-task", label: "新增任务" },
            { id: "add-collaborator", label: "加入协作者" },
          ];
        }

        function renderDrawer(zone) {
          const stats = getStats();
          if (!zone) {
            drawer.innerHTML = [
              '<div class="eyebrow">等待交互区</div>',
              '<h2>靠近房屋、门口或告示牌</h2>',
              '<p>我现在按原游戏对象层和相机位置来放框。你靠近粉色框后按 Enter，我就打开对应的产品功能说明。外场还挂了多人协作原型：人会在地图里巡场，任务会流动，电脑会生成小屋，AI 会生成鸡和牛。</p>',
              '<div class="drawer-stats"><div>任务：' + stats.tasks + '</div><div>电脑房：' + stats.computers + '</div><div>Codex 鸡：' + stats.codex + '</div><div>Claude 牛：' + stats.claude + '</div></div>',
            ].join("");
            return;
          }

          const actions = getZoneActions(zone.id);

          drawer.innerHTML = [
            '<div class="eyebrow">地图功能区</div>',
            "<h2>" + zone.title + "</h2>",
            "<p>" + zone.desc + "</p>",
            '<div class="drawer-stats"><div>任务：' + stats.tasks + '</div><div>需求：' + stats.requirements + '</div><div>电脑房：' + stats.computers + '</div><div>协作者：' + stats.collaborators + '</div><div>Codex 鸡：' + stats.codex + '</div><div>Claude 牛：' + stats.claude + '</div><div>审批：' + stats.approvals + '</div><div>交付：' + stats.deliveries + '</div></div>',
            "<ul>" + zone.bullets.map(function (item) { return "<li>" + item + "</li>"; }).join("") + "</ul>",
            '<div class="drawer-actions">' + actions.map(function (action) { return '<button type="button" data-action="' + action.id + '">' + action.label + "</button>"; }).join("") + "</div>",
          ].join("");
        }

        function setActive(id) {
          activeId = id;
          zoneNodes.forEach(function (node, key) {
            node.classList.toggle("active", key === id);
          });
          legend.querySelectorAll("button").forEach(function (button) {
            button.classList.toggle("active", button.dataset.id === id);
          });
          const zone = (SCENES[currentSceneKey] || []).find(function (item) {
            return item.id === id;
          }) || null;
          renderDrawer(zone);
        }

        function setFocused(id) {
          focusedId = id;
          zoneNodes.forEach(function (node, key) {
            node.classList.toggle("focused", !!id && key === id);
          });
        }

        function distanceToRect(px, py, rect) {
          const dx = Math.max(rect.x - px, 0, px - (rect.x + rect.w));
          const dy = Math.max(rect.y - py, 0, py - (rect.y + rect.h));
          return Math.sqrt((dx * dx) + (dy * dy));
        }

        function ensureSceneUi(sceneKey) {
          if (sceneKey === currentSceneKey) return;
          currentSceneKey = sceneKey;
          sceneChip.textContent = sceneKey ? ("当前场景：" + sceneKey) : "等待游戏场景";
          zoneNodes.clear();
          zonesRoot.innerHTML = "";
          entitiesRoot.innerHTML = "";
          legend.innerHTML = "";

          const zones = SCENES[sceneKey] || [];
          zones.forEach(function (zone) {
            const node = document.createElement("div");
            node.className = "zone";
            node.dataset.id = zone.id;
            node.dataset.label = zone.label;
            zonesRoot.appendChild(node);
            zoneNodes.set(zone.id, node);

            const button = document.createElement("button");
            button.type = "button";
            button.dataset.id = zone.id;
            button.textContent = zone.label;
            button.addEventListener("click", function () {
              setActive(zone.id);
            });
            legend.appendChild(button);
          });

          activeId = null;
          focusedId = null;
          renderDrawer(null);
        }

        function ensureEntityNodes() {
          const entities = getWorldEntities();
          const ids = entities.map(function (item) { return item.id; });
          if (dirtyEntities || entityNodes.size !== entities.length) {
            entityNodes.clear();
            entitiesRoot.innerHTML = "";
          }
          if (entityNodes.size) return entities;
          entities.forEach(function (entity) {
            const node = document.createElement("div");
            node.className = "entity " + entity.kind;
            node.dataset.id = entity.id;
            node.innerHTML = entity.render();
            entitiesRoot.appendChild(node);
            entityNodes.set(entity.id, node);
          });
          dirtyEntities = false;
          return entities;
        }

        function updateEntities(sceneKey, camera, tick) {
          const entities = ensureEntityNodes();
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;

          entities.forEach(function (entity) {
            const node = entityNodes.get(entity.id);
            if (!node) return;
            if (entity.scene !== sceneKey) {
              node.classList.remove("visible");
              return;
            }

            const pos = entity.getPosition(tick);
            const left = (pos.x - viewX) * scaleX;
            const top = (pos.y - viewY) * scaleY;
            const visible = !(left < -120 || top < -80 || left > window.innerWidth + 120 || top > window.innerHeight + 80);
            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
            }
          });
        }

        function createTask(label, status) {
          const id = "t" + Date.now();
          MULTIPLAYER_STATE.tasks.push({
            id: id,
            label: label,
            status: status || "待执行",
            scene: "map-farm",
            path: [{ x: 1220, y: 1240 }, { x: 1940, y: 1830 }, { x: 1605, y: 1660 }, { x: 2088, y: 2450 }],
          });
          markDirty();
        }

        function addComputer() {
          const index = MULTIPLAYER_STATE.computers.length;
          MULTIPLAYER_STATE.computers.push({
            id: "pc" + (index + 1),
            label: "Runner-0" + (index + 1),
            scene: "map-farm",
            x: 1480 + (index * 150),
            y: 1490 + ((index % 2) * 120),
          });
          markDirty();
        }

        function addAgent(type) {
          const index = MULTIPLAYER_STATE.agents.length;
          MULTIPLAYER_STATE.agents.push({
            id: "a" + (index + 1),
            model: type === "codex" ? "Codex" : "Claude",
            species: type === "codex" ? "鸡" : "牛",
            scene: "map-farm",
            x: type === "codex" ? 2215 + (index * 32) : 1605 + (index * 42),
            y: type === "codex" ? 1785 + ((index % 2) * 26) : 1755 + ((index % 2) * 36),
            type: type,
          });
          markDirty();
        }

        function addCollaborator() {
          const index = MULTIPLAYER_STATE.collaborators.length + 1;
          MULTIPLAYER_STATE.collaborators.push({
            id: "p" + index,
            name: "协作者" + index,
            role: index % 2 === 0 ? "测试" : "固件",
            scene: "map-farm",
            path: [{ x: 760, y: 1700 }, { x: 1220, y: 1240 }, { x: 1940, y: 1830 }, { x: 2088, y: 2450 }],
          });
          markDirty();
        }

        function addRequirement() {
          const index = MULTIPLAYER_STATE.requirements.length + 1;
          MULTIPLAYER_STATE.requirements.push({
            id: "r" + index,
            title: "新需求 " + index,
            status: "待拆解",
          });
          markDirty();
        }

        function addApproval() {
          const index = MULTIPLAYER_STATE.approvals.length + 1;
          MULTIPLAYER_STATE.approvals.push({
            id: "ap" + index,
            title: "审批单 " + index,
            status: "待审批",
          });
          markDirty();
        }

        function resolveApproval() {
          if (MULTIPLAYER_STATE.approvals.length) {
            MULTIPLAYER_STATE.approvals.shift();
            MULTIPLAYER_STATE.deliveries.unshift({ id: "d" + Date.now(), title: "审批通过回执", status: "已通过" });
            markDirty();
          }
        }

        function advanceTask() {
          if (MULTIPLAYER_STATE.tasks.length) {
            const task = MULTIPLAYER_STATE.tasks[0];
            const next = { "待执行": "开发中", "开发中": "联调中", "联调中": "待交付", "待交付": "已交付" };
            task.status = next[task.status] || "开发中";
            markDirty();
          }
        }

        function deliverTask() {
          if (MULTIPLAYER_STATE.tasks.length) {
            const task = MULTIPLAYER_STATE.tasks.shift();
            MULTIPLAYER_STATE.deliveries.unshift({ id: "d" + Date.now(), title: task.label, status: "已交付" });
            markDirty();
          }
        }

        function handleAction(actionId) {
          if (actionId === "add-requirement") {
            addRequirement();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "spawn-task") {
            const req = MULTIPLAYER_STATE.requirements.shift();
            createTask(req ? req.title : ("基地任务 " + (MULTIPLAYER_STATE.tasks.length + 1)), "待执行");
            markDirty();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "advance-task") {
            advanceTask();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "add-computer") {
            addComputer();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "add-codex") {
            addAgent("codex");
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "add-claude") {
            addAgent("claude");
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "deliver-task") {
            deliverTask();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "add-approval") {
            addApproval();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "resolve-approval") {
            resolveApproval();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
            return;
          }
          if (actionId === "add-collaborator") {
            addCollaborator();
            renderDrawer((SCENES[currentSceneKey] || []).find(function (item) { return item.id === activeId; }) || null);
          }
        }

        function updateOverlay() {
          const parts = getGameParts();
          if (!parts) {
            sceneChip.textContent = "等待游戏场景";
            focusChip.textContent = "靠近粉色框后按 Enter";
            debug.textContent = "等待 Phaser 场景加载";
            return;
          }

          applyTravel(parts);

          const sceneKey = parts.map.key;
          ensureSceneUi(sceneKey);
          updateEntities(sceneKey, parts.camera, performance.now() / 1000);

          const zones = SCENES[sceneKey] || [];
          const camera = parts.camera;
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;
          const viewW = camera.width;
          const viewH = camera.height;
          const playerX = parts.player.x;
          const playerY = parts.player.y;
          let nearest = null;

          zones.forEach(function (zone) {
            const node = zoneNodes.get(zone.id);
            if (!node) return;

            const left = (zone.rect.x - viewX) * scaleX;
            const top = (zone.rect.y - viewY) * scaleY;
            const width = zone.rect.w * scaleX;
            const height = zone.rect.h * scaleY;
            const visible = !(left + width < -24 || top + height < -24 || left > window.innerWidth + 24 || top > window.innerHeight + 24);

            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
              node.style.width = width + "px";
              node.style.height = height + "px";
            }

            const dist = distanceToRect(playerX, playerY, zone.rect);
            if (!nearest || dist < nearest.dist) {
              nearest = { id: zone.id, dist: dist };
            }
          });

          if (nearest && nearest.dist <= 170) {
            const zone = zones.find(function (item) {
              return item.id === nearest.id;
            });
            setFocused(nearest.id);
            focusChip.textContent = "Enter 打开：" + (zone ? zone.label : nearest.id);
          } else {
            setFocused(null);
            focusChip.textContent = "靠近粉色框后按 Enter";
          }

          debug.textContent = [
            "scene: " + sceneKey,
            "player: " + playerX.toFixed(1) + ", " + playerY.toFixed(1),
            "camera: " + viewX.toFixed(1) + ", " + viewY.toFixed(1) + " / " + viewW + "x" + viewH,
            "focus: " + (focusedId || "none"),
            "active: " + (activeId || "none"),
            "travel: " + (isFiniteNumber(TRAVEL.x) && isFiniteNumber(TRAVEL.y) ? (TRAVEL.x + ", " + TRAVEL.y) : "off"),
          ].join("\n");
        }

        window.addEventListener("keydown", function (event) {
          if (event.key === "Enter" && focusedId) {
            setActive(focusedId);
          }
        });

        drawer.addEventListener("click", function (event) {
          const target = event.target.closest("button[data-action]");
          if (!target) return;
          handleAction(target.dataset.action);
        });

        window.setInterval(updateOverlay, 120);
        renderDrawer(null);
      })();
    </script>
  </body>
</html>
