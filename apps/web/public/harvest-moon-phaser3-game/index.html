<!DOCTYPE HTML>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Harvest Moon Phaser 3 Game</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script>
      (function markProjectShellEmbed() {
        try {
          var params = new URLSearchParams(window.location.search);
          if (params.get("embed") === "project-shell") {
            document.documentElement.classList.add("project-shell-embed");
          }
        } catch (error) {}
      })();

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      body {
        position: relative;
        font-family: Arial, sans-serif;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
        object-fit: fill;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      html.project-shell-embed .overlay .topbar,
      html.project-shell-embed .overlay .nav-actions,
      html.project-shell-embed .overlay .zones,
      html.project-shell-embed .overlay .zone,
      html.project-shell-embed .overlay .legend,
      html.project-shell-embed .overlay .debug,
      html.project-shell-embed .overlay .hint,
      html.project-shell-embed .overlay .drawer,
      html.project-shell-embed .overlay .focus-summary,
      html.project-shell-embed .overlay [data-legacy-project-surface] {
        display: none !important;
      }

      html.project-shell-embed .overlay .entities {
        display: block !important;
      }

      html.project-shell-embed .overlay .entity:not(.seat-npc),
      html.project-shell-embed .overlay .entity-seat-flags,
      html.project-shell-embed .overlay .entity-seat-status-strip,
      html.project-shell-embed .overlay .entity-seat-signals,
      html.project-shell-embed .overlay .entity-enter-prompt,
      html.project-shell-embed .overlay .entity-seat-badge,
      html.project-shell-embed .overlay .entity-nameplate-badge,
      html.project-shell-embed .overlay .entity-nameplate-step,
      html.project-shell-embed .overlay .entity-avatar-step {
        display: none !important;
      }

      html.project-shell-embed .overlay .entity.seat-npc {
        display: none !important;
        pointer-events: none !important;
      }

        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: 10px;

        flex-direction: column;
        align-items: flex-start;

        gap: 8px;

        gap: 6px;

        background: rgba(255, 255, 255, 0.07);

        letter-spacing: 0.01em;
        transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease, background 140ms ease;

        function extractParts(game) {

              const scene = game.scene.keys[sceneKeys[i]];

              const hasMapApi = !!(map && typeof map.key === "string");
              if (scene && hasCameraApi && hasPlayerApi && hasMapApi) {

            return null;

          const keys = Object.keys(window);
          for (let i = 0; i < keys.length; i += 1) {
            const candidate = window[keys[i]];
            if (candidate && extractParts(candidate)) {
              return candidate;

          if (window.parcelRequire && window.parcelRequire.cache) {
            const cache = window.parcelRequire.cache;
            const ids = Object.keys(cache);
            for (let i = 0; i < ids.length; i += 1) {

              if (exported && extractParts(exported)) {

                return exported.default;
              }
            }
          }

          return null;

          const found = findGameInWindow();

          if (found.scene && found.scene.keys) {
            const sceneNames = Object.keys(found.scene.keys);
            lines.push("found scenes: " + sceneNames.join(", "));
            sceneNames.forEach(function (name) {
              const scene = found.scene.keys[name];

          }

          return lines.join("\n");

        function pulseSeatEnterFeedback(zoneId, stepMode) {
          const node = findSeatEntityNode(zoneId);

          node.classList.remove(summaryClass, panelClass);
          void node.offsetWidth;
          node.classList.add(className);
          seatEnterPulseTimers.set(zoneId, window.setTimeout(function () {
            node.classList.remove(className);
            seatEnterPulseTimers.delete(zoneId);

        function isFiniteNumber(value) {
          return Number.isFinite(value);
        }

        function isSceneConfigCandidate(value) {
          return !!(
            value &&
            typeof value === "object" &&
            typeof value.loadedScene === "string" &&
            value.map &&
            value.map.sceneFarm &&
            value.map.sceneFarm.key === "map-farm"
          );
        }

        function findSceneConfigObject(root, seen, depth) {
          if (!root || typeof root !== "object") return null;
          if (seen.has(root) || depth > 3) return null;
          seen.add(root);

          if (isSceneConfigCandidate(root)) {
            return root;
          }

          const keys = Object.keys(root);
          for (let i = 0; i < keys.length; i += 1) {
            const next = root[keys[i]];
            const found = findSceneConfigObject(next, seen, depth + 1);
            if (found) return found;
          }

          return null;
        }

        function getRuntimeSceneConfig() {
          const seen = new WeakSet();

          const fromWindow = findSceneConfigObject(window, seen, 0);
          if (fromWindow) return fromWindow;

          if (window.parcelRequire && window.parcelRequire.cache) {
            const ids = Object.keys(window.parcelRequire.cache);
            for (let i = 0; i < ids.length; i += 1) {
              const entry = window.parcelRequire.cache[ids[i]];
              const exported = entry && entry.exports;
              const found = findSceneConfigObject(exported, seen, 0);
              if (found) return found;
            }
          }

          return null;
        }

        function applyTravel(parts) {
          if (travelApplied) return;
          if (!parts) return;

          const sceneLookup = {
            "map-farm": "sceneFarm",
            "map-home": "sceneHome",
            "map-coop": "sceneCoop",
            "map-toolshed": "sceneToolShed",
            "map-cowshed": "sceneCowShed",
            "map-crossroads": "sceneCrossRoads",
          };

          if (TRAVEL.scene && TRAVEL.scene !== parts.map.key) {
            const nextScene = sceneLookup[TRAVEL.scene];
            if (nextScene && parts.scene && parts.scene._OBJECTS && typeof parts.scene._OBJECTS.newScene === "function") {
              travelDebug = "via object loader -> " + nextScene;
              parts.scene._OBJECTS.newScene(nextScene);
              return;
            }

            if (nextScene) {
              const runtimeConfig = getRuntimeSceneConfig();
              if (runtimeConfig) {
                travelDebug = "via runtime config " + runtimeConfig.loadedScene + " -> " + nextScene;
                runtimeConfig.previousData = runtimeConfig.previousData || {};
                runtimeConfig.previousData.scene = runtimeConfig.loadedScene;
                runtimeConfig.loadedScene = nextScene;
                if (parts.scene && parts.scene.scene && typeof parts.scene.scene.restart === "function") {
                  travelDebug += " restart";
                  parts.scene.scene.restart();
                }
                return;
              }
              travelDebug = "no runtime config for " + nextScene;
            }
            return;
          }

          if (!isFiniteNumber(TRAVEL.x) || !isFiniteNumber(TRAVEL.y)) {
            travelApplied = true;
            return;
          }

          if (!parts.player || typeof parts.player.setPosition !== "function") {
            travelDebug = "player api unavailable";
            return;
          }

          parts.player.setPosition(TRAVEL.x, TRAVEL.y);
          if (parts.player.body && typeof parts.player.body.reset === "function") {
            parts.player.body.reset(TRAVEL.x, TRAVEL.y);
          }
          if (parts.camera && typeof parts.camera.centerOn === "function") {
            parts.camera.centerOn(TRAVEL.x, TRAVEL.y);
          }
          travelApplied = true;
        }

        function getZoneVisualMeta(zoneId) {

            "project-room": { kind: "zone-command", marker: "总" },
            "development-workshop": { kind: "zone-workshop", marker: "工" },
            "schedule-calendar": { kind: "zone-command", marker: "历" },

            "tasks": { kind: "zone-field", marker: "田" },
            "ai": { kind: "zone-aihub", marker: "智" },
            "chat": { kind: "zone-courtyard", marker: "院" },
            "computers": { kind: "zone-machine", marker: "机" },
            "member-wall": { kind: "zone-crew", marker: "组" },

            "runner-console": { kind: "zone-ops", marker: "控" },
            "computer-room": { kind: "zone-ops", marker: "机" },
            "computers": { kind: "zone-ops", marker: "机" },
            "device-rack": { kind: "zone-ops", marker: "设" },
            "build-bench": { kind: "zone-workshop", marker: "构" },
            "delivery": { kind: "zone-deliveryyard", marker: "坊" },
            "delivery-room": { kind: "zone-deliveryyard", marker: "坊" },
            "release-crate": { kind: "zone-deliveryyard", marker: "交" },
            "approvals": { kind: "zone-gate", marker: "审" },
          };

        function renderDrawer(zone) {
          if (!zone) {
            clearSeatDrawerSectionFocus();
            drawer.className = "drawer is-idle";
            drawer.innerHTML = "";
            drawer.removeAttribute("data-seat-step-mode");
            drawer.setAttribute("aria-hidden", "true");
            drawer.setAttribute("aria-label", "地图抽屉");
            return;
          }

          const stats = getStats();
          const actions = getZoneActions(zone.id);
          const primaryGoal = zone.bullets && zone.bullets.length ? zone.bullets[0] : "推进当前房间目标";
          const roomMood = zone.bullets && zone.bullets.length > 1 ? zone.bullets[1] : "查看这个房间里的状态和下一步动作";
          const eyebrow = zone.dynamicSeat ? "驻场 NPC" : "地图功能区";
          const heroPrimary = zone.heroPrimary || primaryGoal;
          const heroSecondary = zone.heroSecondary || roomMood;
          const seatAgent = zone.dynamicSeat ? getSeatAgentByZoneId(zone.id) : null;
          const seatEnterMeta = seatAgent ? getSeatEnterMeta(zone.id, seatAgent, zone) : null;
          const drawerStepMode = seatEnterMeta ? (seatEnterMeta.chipStep === "panel" ? "panel" : "summary") : "";
          const drawerStepLabel = drawerStepMode ? (drawerStepMode === "panel" ? "2/2 面板" : "1/2 摘要") : "";
          const projectSummaryHtml = (zone.id === "project" || zone.id === "project-room") ? renderProjectSummary() : "";
          const memberWallSummaryHtml = zone.id === "member-wall" ? renderMemberWallSummary() : "";
          const statsHtml = projectSummaryHtml ? "" : ('<div class="drawer-stats"><div>任务：' + stats.tasks + '</div><div>需求：' + stats.requirements + '</div><div>电脑房：' + stats.computers + '</div><div>协作者：' + stats.collaborators + '</div><div>Codex 鸡：' + stats.codex + '</div><div>Claude 牛：' + stats.claude + '</div><div>审批：' + stats.approvals + '</div><div>交付：' + stats.deliveries + '</div></div>');
          const seatVisualMeta = zone.dynamicSeat ? getZoneVisualMeta(zone.id) : null;
          const themeMap = {
            "development-workshop": "theme-ops",
            "schedule-calendar": "theme-command",
            "serial-tv": "theme-ops",
            "story-desk": "theme-command",
            "project": "theme-command",
            "project-room": "theme-command",
            "chat": "theme-crew",
            "member-wall": "theme-crew",
            "chat-room": "theme-crew",
            "handoff-table": "theme-crew",
            "runner-console": "theme-ops",
            "computer-room": "theme-ops",
            "computers": "theme-ops",
            "device-rack": "theme-ops",
            "delivery": "theme-workshop",
            "delivery-room": "theme-workshop",
            "build-bench": "theme-workshop",
            "release-crate": "theme-workshop",
          };
          const seatTheme =
            !seatVisualMeta
              ? ""
              : seatVisualMeta.kind === "zone-ops"
                ? "theme-ops"
                : seatVisualMeta.kind === "zone-workshop" || seatVisualMeta.kind === "zone-deliveryyard"
                  ? "theme-workshop"
                  : seatVisualMeta.kind === "zone-crew"
                    ? "theme-crew"
                    : "theme-command";
          drawer.className = "drawer " + (seatTheme || themeMap[zone.id] || "theme-command");
          if (drawerStepMode) {
            drawer.dataset.seatStepMode = drawerStepMode;
          } else {
            drawer.removeAttribute("data-seat-step-mode");
          }
          drawer.setAttribute("aria-hidden", "false");
          drawer.setAttribute("aria-label", (zone.dynamicSeat ? "NPC 席位抽屉" : "地图功能区抽屉") + " · " + zone.title);

          drawer.innerHTML = [
            '<div class="eyebrow">' + eyebrow + "</div>",
            "<h2>" + zone.title + "</h2>",
            "<p>" + zone.desc + "</p>",
            '<div class="drawer-hero"><strong data-step-mode="' + escapeHtml(drawerStepMode) + '">进入这间房先做：' + heroPrimary + (drawerStepLabel ? ('<span class="drawer-hero-step" data-step="' + escapeHtml(drawerStepMode) + '">' + escapeHtml(drawerStepLabel) + '</span>') : "") + '</strong><span data-step-mode="' + escapeHtml(drawerStepMode) + '">' + heroSecondary + '</span></div>',
            projectSummaryHtml,
            memberWallSummaryHtml,
            statsHtml,
            renderWorkflowStrip(zone.id),
            renderStateSections(zone.id),
            '<div class="drawer-actions-title">马上操作</div>',
            '<div class="drawer-actions">' + actions.map(function (action) { return '<button type="button" data-action="' + action.id + '">' + action.label + "</button>"; }).join("") + "</div>",
          ].join("");
          syncSeatDrawerSectionFocus(zone.id);

        function setActive(id) {
          if (activeId && activeId !== id) {
            cancelSeatPanelOpen(activeId);
            cancelSeatEnterFeedback(activeId);
            seatSummaryEnterTimes.delete(activeId);
          }
          activeId = id;
          zoneNodes.forEach(function (node, key) {
            node.classList.toggle("active", key === id);
          });
          legend.querySelectorAll("button").forEach(function (button) {
            button.classList.toggle("active", button.dataset.id === id);
          });
          if (String(id || "").indexOf("codex-seat-") === 0) {
            if (seatDrawerSectionZoneId !== id || !seatDrawerSectionKey) {
              primeSeatDrawerSection(id);
            }
          } else {
            clearSeatDrawerSectionFocus();
          }
          const zone = getActiveZoneById(currentSceneKey, id);
          renderDrawer(zone);
          refreshSeatFocusSummary();
          setFocusChipFromZone(id || focusedId);
        }

        function toggleActive(id) {
          if (!id) return;
          if (activeId === id) {
            cancelSeatPanelOpen(id);
            cancelSeatEnterFeedback(id);
            seatSummaryEnterTimes.delete(id);
            activeId = null;
            zoneNodes.forEach(function (node) {
              node.classList.remove("active");
            });
            legend.querySelectorAll("button").forEach(function (button) {
              button.classList.remove("active");
            });
            renderDrawer(null);
            refreshSeatFocusSummary();
            setFocusChipFromZone(focusedId);
            return;
          }
          setActive(id);
        }

        function setFocused(id) {
          let staleFocusFallbackId = null;
          if (String(id || "").indexOf("codex-seat-") === 0 && !getSeatAgentByZoneId(id)) {
            staleFocusFallbackId = activeId && activeId !== id && getSeatAgentByZoneId(activeId) ? activeId : null;
            clearStaleSeatRuntimeState(id, activeId === id || focusedId === id);
            id = null;
          }
          focusedId = id;
          zoneNodes.forEach(function (node, key) {
            node.classList.toggle("focused", !!id && key === id);
          });
          refreshSeatFocusSummary();
          if (!activeId || !id || getSeatAgentByZoneId(id)) {
            setFocusChipFromZone(staleFocusFallbackId || id);
          }
        }

        function distanceToRect(px, py, rect) {
          const dx = Math.max(rect.x - px, 0, px - (rect.x + rect.w));
          const dy = Math.max(rect.y - py, 0, py - (rect.y + rect.h));
          return Math.sqrt((dx * dx) + (dy * dy));
        }

        function ensureSceneUi(sceneKey) {
          if (sceneKey === currentSceneKey) return;
          cancelAllSeatPanelOpens();
          cancelAllSeatEnterFeedback();
          seatSummaryEnterTimes.clear();
          currentSceneKey = sceneKey;
          destroySeatNpcWorldSprites();
          seatNpcWorldSceneKey = "";
          destroyCollaboratorWorldSprites();
          collaboratorWorldSceneKey = "";
          destroyCurrentPlayerLabel();
          currentPlayerLabelSceneKey = "";
          destroyScheduleHotspot();
          scheduleHotspotSceneKey = "";
          destroySerialTvHotspot();
          serialTvHotspotSceneKey = "";
          destroyDevelopmentWorkshopHotspot();
          developmentWorkshopHotspotSceneKey = "";
          sceneChip.textContent = sceneKey ? ("当前场景：" + sceneKey) : "等待游戏场景";
          zoneNodes.clear();
          entityNodes.clear();
          zonesRoot.innerHTML = "";
          entitiesRoot.innerHTML = "";
          legend.innerHTML = "";

          const zones = getSceneZones(sceneKey);
          zones.forEach(function (zone) {
            const visualMeta = getZoneVisualMeta(zone.id);
            const node = document.createElement("div");
            node.className = "zone " + visualMeta.kind;
            node.dataset.id = zone.id;
            node.dataset.label = zone.label;
            node.innerHTML =
              '<div class="zone-badge">' + visualMeta.marker + '</div>' +
              '<div class="zone-props"><span></span><span></span><span></span></div>' +
              '<div class="zone-corners"><span></span><span></span></div>';
            node.addEventListener("click", function () {
              toggleActive(zone.id);
            });
            zonesRoot.appendChild(node);
            zoneNodes.set(zone.id, node);

            const button = document.createElement("button");
            button.type = "button";
            button.dataset.id = zone.id;
            button.dataset.kind = visualMeta.kind;
            button.textContent = zone.label;
            button.addEventListener("click", function () {
              toggleActive(zone.id);
            });
            legend.appendChild(button);
          });

          activeId = null;
          focusedId = null;
          renderDrawer(null);
          refreshSeatFocusSummary();
        }

        function ensureEntityNodes() {
          const entities = getWorldEntities();
          const ids = entities.map(function (item) { return item.id; });
          const currentEntityIds = Array.from(entityNodes.keys());
          const entityIdsChanged = ids.some(function (id) {
            return !entityNodes.has(id);
          });
          const entityOrderChanged = ids.some(function (id, index) {
            return currentEntityIds[index] !== id;
          });
          if (dirtyEntities || entityNodes.size !== entities.length || entityIdsChanged || entityOrderChanged) {
            cancelAllSeatPanelOpens();
            cancelAllSeatEnterFeedback();
            seatSummaryEnterTimes.clear();
            entityNodes.clear();
            entitiesRoot.innerHTML = "";
          }
          if (entityNodes.size) return entities;
          entities.forEach(function (entity) {
            const node = document.createElement("div");
            node.className = "entity " + entity.kind + (entity.layout ? (" " + entity.layout) : "");
            node.dataset.id = entity.id;
            node.dataset.seatZone = entity.seatZoneId || "";
            node.innerHTML = entity.render();
            if (entity.seatZoneId) {
              node.addEventListener("click", function (event) {
                if (performSeatZoneEnterAction(entity.seatZoneId)) {
                  event.preventDefault();
                  event.stopPropagation();
                }
              });
            }
            entitiesRoot.appendChild(node);
            entityNodes.set(entity.id, node);
          });
          dirtyEntities = false;
          return entities;
        }

        function syncSeatEntityRuntimeState(node, seatZoneId, isActiveSeat) {
          if (!node || !seatZoneId) return;
          const expanded = isActiveSeat ? "true" : "false";
          const stepMode = isActiveSeat ? "panel" : "summary";
          const stepLabel = isActiveSeat ? "2/2 面板" : "1/2 摘要";
          const actionLabel = isActiveSeat ? "2/2 点击进入面板" : "1/2 点击打开摘要 / 2/2 进入面板";
          const enterLabel = isActiveSeat ? "2/2 再按 Enter 进入面板" : "1/2 按 Enter 打开摘要";
          const promptLabel = isActiveSeat ? "2/2 Enter 进面板" : "1/2 Enter 打开摘要";
          const sectionFocusKey = seatDrawerSectionZoneId === seatZoneId ? seatDrawerSectionKey : "";
          const seatAgent = getSeatAgentByZoneId(seatZoneId);
          const runtimeSignature = seatAgent ? [
            getSeatRecentTaskPreview(seatAgent),
            getSeatAckPreview(seatAgent),
            getSeatFinalPreview(seatAgent),
            getSeatDecisionPreview(seatAgent),
            getSeatPrimarySignalKind(seatAgent),
            getSeatLatestSignalKind(seatAgent),
            getSeatSignalLabel(seatAgent),
            getSeatRequirementShortLabel(seatAgent),
            getSeatActionTargetLabel(seatZoneId, seatAgent),
          ].join("\u001f") : "";
          if (
            node.dataset.seatExpanded === expanded &&
            node.dataset.seatRuntimeZone === seatZoneId &&
            node.dataset.seatSectionFocus === sectionFocusKey &&
            node.dataset.seatRuntimeSignature === runtimeSignature
          ) {
            return;
          }
          node.dataset.seatExpanded = expanded;
          node.dataset.seatRuntimeZone = seatZoneId;
          node.dataset.seatSectionFocus = sectionFocusKey;
          node.dataset.seatRuntimeSignature = runtimeSignature;
          function syncRuntimeCopy(value) {
            if (!value) return value;
            return value
              .replace(/1\/2 点击打开摘要 \/ 2\/2 进入面板|2\/2 点击进入面板/g, actionLabel)
              .replace(/1\/2 按 Enter 打开摘要|2\/2 再按 Enter 进入面板/g, enterLabel)
              .replace(/1\/2 Enter 打开摘要|2\/2 Enter 进面板/g, promptLabel)
              .replace(/1\/2 摘要|2\/2 面板/g, stepLabel);
          }
          function getEntitySignalRuntimeMeta(signalKind) {
            if (signalKind === "ack") return { label: "回执", value: getSeatAckPreview(seatAgent) };
            if (signalKind === "final") return { label: "回复", value: getSeatFinalPreview(seatAgent) };
            if (signalKind === "decision") return { label: seatNeedsHumanReview(seatAgent) ? "人审" : "推进", value: getSeatDecisionPreview(seatAgent) };
            return { label: "任务", value: getSeatRecentTaskPreview(seatAgent) };
          }
          function syncEntitySignalBadge(button, isNext, isAligned) {
            const existingBadge = button.querySelector(".entity-seat-signal-aligned, .entity-seat-signal-viewing, .entity-seat-signal-next");
            const badgeClass = isAligned ? (isNext ? "entity-seat-signal-aligned" : "entity-seat-signal-viewing") : (isNext ? "entity-seat-signal-next" : "");
            const badgeText = isAligned ? (isNext ? "当前一步" : "当前查看") : (isNext ? "下一步" : "");
            if (!badgeClass) {
              if (existingBadge) existingBadge.remove();
              return;
            }
            const badge = existingBadge || document.createElement("span");
            badge.className = badgeClass;
            badge.dataset.stepMode = stepMode;
            badge.textContent = badgeText;
            if (!existingBadge) {
              const head = button.querySelector(".entity-seat-signal-head");
              if (head) head.appendChild(badge);
            }
          }
          node.querySelectorAll("[data-seat-zone]").forEach(function (item) {
            if (item.dataset.seatZone !== seatZoneId) return;
            if (item.hasAttribute("aria-expanded")) {
              item.setAttribute("aria-expanded", expanded);
            }
            if (item.hasAttribute("aria-label")) {
              item.setAttribute("aria-label", syncRuntimeCopy(item.getAttribute("aria-label") || ""));
            }
            if (item.hasAttribute("title")) {
              item.setAttribute("title", syncRuntimeCopy(item.getAttribute("title") || ""));
            }
            if (item.dataset.stepMode) {
              item.dataset.stepMode = stepMode;
            }
            if (item.classList.contains("entity-enter-prompt")) {
              item.dataset.stepLabel = stepLabel;
            }
          });
          node.querySelectorAll(".entity-entry-step").forEach(function (item) {
            item.dataset.step = stepMode;
            item.textContent = stepLabel;
          });
          node.querySelectorAll(".entity-nameplate-badge, .entity-flag--stable, .entity-enter-prompt-copy, .entity-enter-prompt-badge, .entity-enter-prompt-target, .entity-enter-prompt-detail, .entity-seat-status-strip, .entity-seat-signals, .entity-seat-signal-head, .entity-seat-signal-step, .drawer-pill-step").forEach(function (item) {
            if (item.dataset.stepMode) {
              item.dataset.stepMode = stepMode;
            }
          });
          node.querySelectorAll(".entity-seat-signal-step, .drawer-pill-step").forEach(function (item) {
            item.textContent = stepLabel;
          });
          if (seatAgent) {
            const statusStrip = node.querySelector(".entity-seat-status-strip");
            if (statusStrip) {
              statusStrip.innerHTML = renderSeatStatusPills(seatZoneId, seatAgent, true, true, "entity");
            }
            const signalRail = node.querySelector(".entity-seat-signals");
            if (signalRail) {
              signalRail.innerHTML = renderSeatEntitySignals(seatZoneId, seatAgent);
              signalRail.dataset.stepMode = stepMode;
            }
            const nextKind = getSeatPrimarySignalKind(seatAgent);
            const requirementShortLabel = getSeatRequirementShortLabel(seatAgent);
            node.querySelectorAll(".entity-seat-signal[data-kind]").forEach(function (button) {
              if (button.dataset.seatZone !== seatZoneId) return;
              const signalKind = button.dataset.kind || "task";
              const signalMeta = getEntitySignalRuntimeMeta(signalKind);
              const state = getSeatSignalState(signalKind, seatAgent);
              const isNext = signalKind === nextKind;
              const isAligned = isSeatSignalAligned(seatZoneId, signalKind);
              const ariaCurrent = isAligned ? (isNext ? "step" : "location") : (isNext ? "step" : "");
              const stateLabel = isAligned && isNext
                ? " / 当前查看 / 当前一步"
                : (isAligned ? " / 当前查看" : (isNext ? " / 当前一步" : ""));
              const fullLabel = signalMeta.label + " · " + signalMeta.value + stateLabel + (requirementShortLabel ? (" / " + requirementShortLabel) : "") + " / " + actionLabel;
              button.dataset.state = state;
              button.dataset.next = isNext ? "true" : "false";
              button.dataset.aligned = isAligned ? "true" : "false";
              if (ariaCurrent) {
                button.setAttribute("aria-current", ariaCurrent);
              } else {
                button.removeAttribute("aria-current");
              }
              button.setAttribute("aria-label", fullLabel);
              button.setAttribute("title", fullLabel);
              syncEntitySignalBadge(button, isNext, isAligned);
            });
          }
        }

        function updateEntities(sceneKey, camera, tick) {
          const entities = ensureEntityNodes();
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;
          const drawerWidth = drawer ? drawer.offsetWidth : 0;
          const drawerLeft = drawerWidth ? (window.innerWidth - drawerWidth) : window.innerWidth;

          entities.forEach(function (entity) {
            const node = entityNodes.get(entity.id);
            if (!node) return;
            if (entity.scene !== sceneKey) {
              node.classList.remove("visible");
              return;
            }

            const pos = entity.getPosition(tick);
            const left = (pos.x - viewX) * scaleX;
            const top = (pos.y - viewY) * scaleY;
            let visible = !(left < -120 || top < -80 || left > window.innerWidth + 120 || top > window.innerHeight + 80);
            if (visible && left < 210 && top < 150) visible = false;
            if (visible && left > drawerLeft - 36) visible = false;
            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
            }
            node.classList.toggle("is-focused", !!entity.seatZoneId && entity.seatZoneId === focusedId);
            node.classList.toggle("is-active", !!entity.seatZoneId && entity.seatZoneId === activeId);
            if (entity.seatZoneId) {
              syncSeatEntityRuntimeState(node, entity.seatZoneId, entity.seatZoneId === activeId);
            }
          });
        }

        function destroySeatNpcWorldSprites() {
          seatNpcWorldSprites.forEach(function (entry) {
            try {
              if (entry.label && typeof entry.label.destroy === "function") entry.label.destroy();
              if (entry.sprite && typeof entry.sprite.destroy === "function") entry.sprite.destroy();
            } catch (error) {}
          });
          seatNpcWorldSprites.clear();
          try {
            window.__platformSeatNpcWorldSnapshot = [];
          } catch (error) {}
        }

        function getSeatNpcSpriteTexture(parts) {
          const player = parts && parts.player;
          const texture = player && player.texture;
          const textureKey = texture && texture.key ? texture.key : "";
          if (!textureKey) return null;
          const frame = player && player.frame;
          return {
            key: textureKey,
            frame: frame && (frame.name || frame.index) !== undefined ? (frame.name || frame.index) : undefined,
            width: player.displayWidth || player.width || 44,
            height: player.displayHeight || player.height || 64,
          };
        }

        function createSeatNpcWorldSprite(parts, agent, textureMeta) {
          const scene = parts && parts.scene;
          if (!scene || !scene.add || !textureMeta) return null;
          const zoneId = "codex-seat-" + agent.workstationId;
          const sprite = scene.add.sprite(Number(agent.x) || 0, Number(agent.y) || 0, textureMeta.key, textureMeta.frame);
          sprite.setName("platform-npc-" + agent.workstationId);
          sprite.setDepth((Number(agent.y) || 0) + 9000);
          if (typeof sprite.setDisplaySize === "function") {
            sprite.setDisplaySize(textureMeta.width, textureMeta.height);
          }
          if (typeof sprite.setInteractive === "function") {
            try {
              sprite.setInteractive({ useHandCursor: true });
            } catch (error) {}
          }
          if (typeof sprite.on === "function") {
            sprite.on("pointerdown", function () {
              performSeatZoneEnterAction(zoneId);
            });
          }

        function collaboratorPositionAt(player, tick) {
          const path = Array.isArray(player && player.path) ? player.path : [];
          if (!path.length) return { x: 0, y: 0 };
          if (path.length === 1) return path[0] || { x: 0, y: 0 };

          const speed = 325;
          const segments = [];
          let totalDistance = 0;
          for (let index = 0; index < path.length; index += 1) {
            const from = path[index] || path[0];
            const to = path[(index + 1) % path.length] || path[0];
            const dx = (Number(to.x) || 0) - (Number(from.x) || 0);
            const dy = (Number(to.y) || 0) - (Number(from.y) || 0);
            const distance = Math.max(Math.hypot(dx, dy), 1);
            segments.push({ from, to, distance });
            totalDistance += distance;
          }
          if (!totalDistance) return path[0] || { x: 0, y: 0 };

          let travel = ((Number(tick || 0) * speed) % totalDistance + totalDistance) % totalDistance;
          for (let index = 0; index < segments.length; index += 1) {
            const segment = segments[index];
            if (travel > segment.distance) {
              travel -= segment.distance;
              continue;
            }
            const progress = segment.distance ? travel / segment.distance : 0;
            const eased = progress < 0.5
              ? 2 * progress * progress
              : 1 - Math.pow(-2 * progress + 2, 2) / 2;
            const fromX = Number(segment.from.x) || 0;
            const fromY = Number(segment.from.y) || 0;
            const toX = Number(segment.to.x) || 0;
            const toY = Number(segment.to.y) || 0;
            return {
              x: fromX + ((toX - fromX) * eased),
              y: fromY + ((toY - fromY) * eased),
            };
          }
          return path[path.length - 1] || path[0] || { x: 0, y: 0 };
        }

            status: "已对齐责任人",

          markDirty();

          const pendingRequirement = MULTIPLAYER_STATE.requirements.find(function (item) {
            return item.status === "待拆解" || item.status === "开发中" || item.status === "已对齐";
          });
          const pendingApproval = MULTIPLAYER_STATE.approvals.find(function (item) {
            return item.status !== "已通过";

          const activeLock = MULTIPLAYER_STATE.fileLocks.find(function (item) {
            return item.status === "编辑中" || item.status === "待确认";
          });
          const focus = pendingRequirement
            ? ("先处理需求链 · " + pendingRequirement.title)
            : pendingApproval
              ? ("先过人工门岗 · " + pendingApproval.title)
              : activeLock
                ? ("确认文件边界 · " + activeLock.scope)
                : "基地状态稳定，推进今日联调";

          MULTIPLAYER_STATE.decisionLog.unshift({
            id: "dg" + Date.now(),
            title: focus,
            status: "已写入主控室",
            owner: "主控内室",
          });

            pendingRequirement.status = "已进入排期";
          }

          updateStory("回到主线桌，按今日路线继续推进");
          markDirty();
        }

          const pendingRequirement = MULTIPLAYER_STATE.requirements.find(function (item) {
            return item.status !== "已交付";
          });
          const activeTask = MULTIPLAYER_STATE.tasks.find(function (item) {
            return item.status !== "已交付";
          });
          const nextRoute = activeTask
            ? "任务田块 -> 电脑车间 -> 审批门岗"
            : pendingRequirement
              ? "需求信箱 -> 会议板 -> 任务田块"
              : "AI 工位站 -> 电脑车间 -> 交付工坊";
          const title = activeTask
            ? ("推进 " + activeTask.label)
            : pendingRequirement
              ? ("拆解 " + pendingRequirement.title)
              : "巡检基地闭环";

          MULTIPLAYER_STATE.commandPlans.unshift({
            id: "cp" + Date.now(),
            title: title,
            status: "已排入今日路线",
            next: nextRoute,
          });

          if (pendingRequirement && pendingRequirement.status === "已进入排期") {
            pendingRequirement.status = "待播种";
          }

          updateStory("按主线桌路线依次巡场推进");
          markDirty();
        }

            return item.status === "待拆解" || item.status === "已进入排期" || item.status === "待播种";
          });
          const owner = latestNote ? latestNote.owner : ((MULTIPLAYER_STATE.collaborators[0] && MULTIPLAYER_STATE.collaborators[0].name) || "会议板");
          const title = pendingRequirement ? pendingRequirement.title : (latestNote ? latestNote.title : "新讨论结论");

          MULTIPLAYER_STATE.meetingTickets.unshift({
            id: "mt" + Date.now(),
            title: title,
            status: "已路由到任务田块",
            owner: owner,
          });

            latestNote.status = "已转任务";
          }
          if (pendingRequirement) {
            pendingRequirement.status = "待播种";
          }

          updateStory("去任务田块把会议结论播种成任务");
          markDirty();

          const item = MULTIPLAYER_STATE.fileLocks[0];

          if (item.status === "编辑中") item.status = "待确认";
          else if (item.status === "待确认") item.status = "待接手";
          else item.status = "编辑中";
          MULTIPLAYER_STATE.story.current = "检查成员墙，确认文件范围和责任边界";
          markDirty();

          const item = MULTIPLAYER_STATE.handoffs[0];

          else if (item.status === "待人工确认") item.status = "已接手";
          else item.status = "上下文完整";
          MULTIPLAYER_STATE.story.current = "检查成员墙，确认接手后的责任边界";
          markDirty();

            MULTIPLAYER_STATE.story.completed.unshift(MULTIPLAYER_STATE.story.current);

          const emptyPlot = MULTIPLAYER_STATE.taskPlots.find(function (plot) { return plot.stage === "empty"; });

            emptyPlot.progress = 1;

          const plot = MULTIPLAYER_STATE.taskPlots.find(function (item) { return item.stage !== "empty" && item.stage !== "ready"; });
          if (!plot) return;
          plot.stage = flow[plot.stage] || "ready";
          plot.progress = Math.min((plot.progress || 0) + 1, 4);
          markDirty();
        }

          const plot = MULTIPLAYER_STATE.taskPlots.find(function (item) { return item.stage === "ready"; });

          MULTIPLAYER_STATE.deliveries.unshift({ id: "d" + Date.now(), title: plot.title, status: "田块已收获" });
          createTask(plot.title, "待交付");
          plot.title = "空田块";
          plot.stage = "empty";

          markDirty();

            advanceTaskPlot();
          } else if (actionId === "harvest-plot") {
            harvestTaskPlot();
          } else if (actionId === "feed-agent") {
            feedAgent();
          } else if (actionId === "talk-agent") {
            talkAgent();
          } else if (actionId === "add-requirement") {
            addRequirement();
          } else if (actionId === "spawn-task") {
            const req = MULTIPLAYER_STATE.requirements.shift();
            createTask(req ? req.title : ("研发任务 " + (MULTIPLAYER_STATE.tasks.length + 1)), "待执行");
            updateStory("把任务播种到田块里");
            markDirty();
          } else if (actionId === "advance-task") {
            advanceTask();
          } else if (actionId === "add-computer") {
            addComputer();
            updateStory("接入 AI、电脑和 Runner 形成闭环");
          } else if (actionId === "add-chat-note") {
            addChatNote();
          } else if (actionId === "sync-project-room") {
            syncProjectRoom();
          } else if (actionId === "draft-plan") {
            addCommandPlan();
          } else if (actionId === "route-meeting") {
            routeMeetingOutcome();
          } else if (actionId === "cycle-file-lock") {
            cycleFileLock();
          } else if (actionId === "advance-handoff") {
            advanceHandoff();
          } else if (actionId === "deliver-task") {
            deliverTask();
          } else if (actionId === "add-approval") {
            addApproval();
          } else if (actionId === "resolve-approval") {
            resolveApproval();
          } else if (actionId === "add-collaborator") {
            addCollaborator();
          }
          renderDrawer(getActiveZoneById(currentSceneKey, activeId));
        }

        function getZoneActions(zoneId) {
          if (String(zoneId || "").indexOf("codex-seat-") === 0) {
            const seatAgent = getSeatAgentByZoneId(zoneId);
            return [
              { id: "open-seat-panel", label: seatAgent ? ("打开 " + (seatAgent.displayName || "NPC") + " 面板") : "打开 NPC 面板" },
            ];
          }
          if (zoneId === "schedule-calendar") return [
            { id: "open-schedule-panel", label: "打开日程日历" },
          ];
          if (zoneId === "serial-tv") return [
            { id: "open-serial-tv-panel", label: "打开串口电视" },
          ];
          if (zoneId === "development-workshop") return [
            { id: "open-development-workshop-panel", label: "打开开发工坊" },
          ];
          if (zoneId === "requirements") return [
            { id: "add-requirement", label: "收 1 条需求" },
            { id: "spawn-task", label: "拆成任务" },
          ];
          if (zoneId === "tasks") return [
            { id: "plant-task", label: "播种任务" },
            { id: "advance-plot", label: "推进田块" },
            { id: "harvest-plot", label: "收获交付" },
          ];
          if (zoneId === "ai" || zoneId === "chat-room") return [
            { id: "feed-agent", label: "投喂 AI 动物" },
            { id: "talk-agent", label: "和 AI 沟通" },
          ];
          if (zoneId === "story-desk") return [
            { id: "spawn-task", label: "派发主线任务" },
            { id: "advance-plot", label: "推进今日主线" },
          ];
          if (zoneId === "member-wall") return [
            { id: "add-collaborator", label: "加入协作者" },
            { id: "cycle-file-lock", label: "切换软锁状态" },
            { id: "talk-agent", label: "协调 AI 分工" },
          ];
          if (zoneId === "runner-console" || zoneId === "computers" || zoneId === "computer-room") return [
            { id: "add-computer", label: "加 1 台电脑" },
            { id: "advance-task", label: "派 Runner 执行" },
          ];
          if (zoneId === "device-rack") return [
            { id: "add-computer", label: "补 1 个节点" },
            { id: "add-approval", label: "登记硬件审批" },
          ];
          if (zoneId === "handoff-table") return [
            { id: "add-collaborator", label: "安排接手" },
            { id: "advance-handoff", label: "确认交接" },
          ];
          if (zoneId === "meeting-board" || zoneId === "chat") return [
            { id: "add-chat-note", label: "记录讨论" },
            { id: "spawn-task", label: "派生任务" },
          ];
          if (zoneId === "build-bench") return [
            { id: "advance-task", label: "构建并验证" },
            { id: "add-approval", label: "申请实验确认" },
          ];
          if (zoneId === "release-crate" || zoneId === "delivery" || zoneId === "delivery-room") return [
            { id: "deliver-task", label: "完成交付" },
            { id: "resolve-approval", label: "发出回执" },
          ];
          if (zoneId === "approvals") return [
            { id: "add-approval", label: "发起审批" },
            { id: "resolve-approval", label: "通过审批" },
          ];
          if (zoneId === "project" || zoneId === "project-room") return [
            { id: "spawn-task", label: "派 1 个任务" },
            { id: "add-collaborator", label: "加入协作者" },
          ];
          return [
            { id: "spawn-task", label: "新增任务" },
            { id: "add-collaborator", label: "加入协作者" },
          ];
        }

        function renderStateSections(zoneId) {
          const sections = [];

          if (zoneId === "project" || zoneId === "project-room" || zoneId === "story-desk" || zoneId === "schedule-calendar" || zoneId === "serial-tv" || zoneId === "development-workshop") {
            sections.push('<div class="drawer-section"><h3>当前主线</h3><div class="drawer-pills"><span>' + (MULTIPLAYER_STATE.story && MULTIPLAYER_STATE.story.current ? MULTIPLAYER_STATE.story.current : "先接入 AI、电脑和 Runner") + "</span></div></div>");
          }
          if (zoneId === "development-workshop") {
            sections.push('<div class="drawer-section"><h3>开发工坊</h3><div class="drawer-pills"><span>项目生成</span><span>环境搭建</span><span>连线选型</span><span>调试仿真</span></div></div>');
          }
          if (zoneId === "schedule-calendar") {
            sections.push('<div class="drawer-section"><h3>日程日历</h3><div class="drawer-pills"><span>任务 DDL</span><span>每日安排</span><span>AI 排程</span></div></div>');
          }
          if (zoneId === "serial-tv") {
            sections.push('<div class="drawer-section"><h3>串口电视</h3><div class="drawer-pills"><span>USB 扫描</span><span>串口收发</span><span>数字波形</span></div></div>');
          }
          if (zoneId === "project" || zoneId === "project-room") {
            sections.push('<div class="drawer-section"><h3>主控决议</h3>' + renderPills(MULTIPLAYER_STATE.decisionLog, function (item) { return item.title + " · " + item.status; }, "暂无决议") + "</div>");
          }
          if (zoneId === "project" || zoneId === "project-room" || zoneId === "story-desk") {
            sections.push('<div class="drawer-section"><h3>今日路线</h3>' + renderPills(MULTIPLAYER_STATE.commandPlans, function (item) { return item.title + " · " + item.status + " · " + item.next; }, "暂无路线") + "</div>");
          }
          if (zoneId === "member-wall" || zoneId === "project" || zoneId === "project-room") {
            sections.push('<div class="drawer-section"><h3>成员与协作</h3>' + renderPills(MULTIPLAYER_STATE.collaborators, function (item) { return item.name + " · " + item.role + " · " + (item.ownership || "待分工"); }, "暂无协作者") + "</div>");
          }
          if (zoneId === "member-wall") {
            sections.push('<div class="drawer-section"><h3>成员分工</h3>' + renderPills(MULTIPLAYER_STATE.collaborators, function (item) { return item.name + " · " + (item.ownership || "待分工"); }, "暂无分工") + "</div>");
            sections.push('<div class="drawer-section"><h3>接手关系</h3>' + renderPills(MULTIPLAYER_STATE.handoffs, function (item) { return item.from + " -> " + item.to + " · " + item.status; }, "暂无接手") + "</div>");
            sections.push('<div class="drawer-section"><h3>在线状态</h3>' + renderPills(MULTIPLAYER_STATE.collaborators, function (item) { return item.name + " · 在线 · " + item.role; }, "暂无在线成员") + "</div>");
          }
          if (zoneId === "member-wall" || zoneId === "project" || zoneId === "project-room") {
            sections.push('<div class="drawer-section"><h3>文件软锁</h3>' + renderPills(MULTIPLAYER_STATE.fileLocks, function (item) { return item.scope + " · " + item.owner + " · " + item.status; }, "暂无软锁") + "</div>");
          }
          if (zoneId === "member-wall" || zoneId === "chat" || zoneId === "chat-room" || zoneId === "handoff-table") {
            sections.push('<div class="drawer-section"><h3>交接接力</h3>' + renderPills(MULTIPLAYER_STATE.handoffs, function (item) { return item.from + " -> " + item.to + " · " + item.topic + " · " + item.status; }, "暂无交接") + "</div>");
          }
          if (zoneId === "requirements" || zoneId === "meeting-board") {
            sections.push('<div class="drawer-section"><h3>需求池</h3>' + renderPills(MULTIPLAYER_STATE.requirements, function (item) { return item.title + " · " + item.status; }, "暂无需求") + "</div>");
          }
          if (zoneId === "meeting-board" || zoneId === "chat") {
            sections.push('<div class="drawer-section"><h3>会后清单</h3>' + renderPills(MULTIPLAYER_STATE.meetingTickets, function (item) { return item.title + " · " + item.status + " · " + item.owner; }, "暂无清单") + "</div>");
          }
          if (zoneId === "chat" || zoneId === "chat-room" || zoneId === "meeting-board") {
            sections.push('<div class="drawer-section"><h3>讨论纪要</h3>' + renderPills(MULTIPLAYER_STATE.chatNotes, function (item) { return item.title + " · " + item.status + " · " + item.owner; }, "暂无讨论") + "</div>");
          }
          if (zoneId === "tasks") {
            sections.push('<div class="drawer-section"><h3>任务田块</h3>' + renderPills(MULTIPLAYER_STATE.taskPlots, function (item) { return item.title + " · " + (TASK_STAGE_LABELS[item.stage] || item.stage); }, "暂无田块") + "</div>");
          }
          if (zoneId === "runner-console" || zoneId === "computers" || zoneId === "computer-room" || zoneId === "device-rack") {
            sections.push('<div class="drawer-section"><h3>电脑与节点</h3>' + renderPills(MULTIPLAYER_STATE.computers, function (item) { return item.label; }, "暂无电脑") + "</div>");
          }
          if (zoneId === "ai" || zoneId === "chat-room" || zoneId === "handoff-table") {
            sections.push('<div class="drawer-section"><h3>AI 动物</h3>' + renderPills(MULTIPLAYER_STATE.agents, function (item) { return item.species + " · " + item.model + " · " + (item.ownership || item.mood); }, "暂无 AI") + "</div>");
          }
          if (zoneId === "build-bench" || zoneId === "release-crate" || zoneId === "delivery" || zoneId === "delivery-room") {
            sections.push('<div class="drawer-section"><h3>交付回执</h3>' + renderPills(MULTIPLAYER_STATE.deliveries, function (item) { return item.title + " · " + item.status; }, "暂无交付") + "</div>");
          }
          if (zoneId === "approvals" || zoneId === "device-rack" || zoneId === "build-bench") {
            sections.push('<div class="drawer-section"><h3>审批队列</h3>' + renderPills(MULTIPLAYER_STATE.approvals, function (item) { return item.title + " · " + item.status; }, "暂无审批") + "</div>");
          }

          return sections.join("");
        }

        function updateOverlay() {
          syncExternalCollaborators();
          syncExternalCodexSeats();
          if (AUTO_START && !autoStartDone && autoStartTries < 80) {
            autoStartTries += 1;
            triggerAutoStart();
          }

          let parts = getGameParts();
          if (!parts) {
            const previewParts = buildPreviewParts();
            if (!previewParts) {
              sceneChip.textContent = "等待游戏场景";
              setFocusChipFromZone(null);
              refreshSeatFocusSummary();
              debug.textContent = "等待 Phaser 场景加载\n" + describeGameSearch();
              return;
            }
            parts = previewParts;
            travelDebug = "preview fallback -> " + parts.map.key;
          }

          if (!parts.isPreview) {
            autoStartDone = true;
            applyTravel(parts);
          }

          const sceneKey = parts.map.key;
          ensureSceneUi(sceneKey);
          consumeFocusedSeatZone(sceneKey);
          const presetZone = TRAVEL.focus ? (SCENES[sceneKey] || []).find(function (item) {
            return item.id === TRAVEL.focus;
          }) : null;
          if (presetZone && !activeId) {
            setFocused(presetZone.id);
          }
          updateEntities(sceneKey, parts.camera, performance.now() / 1000);
          syncCollaboratorWorldSprites(parts, sceneKey, performance.now() / 1000);
          syncCurrentPlayerLabel(parts, sceneKey);
          syncSeatNpcWorldSprites(parts, sceneKey);
          syncScheduleHotspot(parts, sceneKey);
          syncSerialTvHotspot(parts, sceneKey);
          syncDevelopmentWorkshopHotspot(parts, sceneKey);

          const zones = getSceneZones(sceneKey);
          const camera = parts.camera;
          const scaleX = window.innerWidth / camera.width;
          const scaleY = window.innerHeight / camera.height;
          const viewX = camera.worldView.x;
          const viewY = camera.worldView.y;
          const viewW = camera.width;
          const viewH = camera.height;
          const playerX = parts.player.x;
          const playerY = parts.player.y;
          let nearest = null;

          zones.forEach(function (zone) {
            const node = zoneNodes.get(zone.id);
            if (!node) return;

            const left = (zone.rect.x - viewX) * scaleX;
            const top = (zone.rect.y - viewY) * scaleY;
            const width = zone.rect.w * scaleX;
            const height = zone.rect.h * scaleY;
            const visible = !(left + width < -24 || top + height < -24 || left > window.innerWidth + 24 || top > window.innerHeight + 24);

            node.classList.toggle("visible", visible);
            if (visible) {
              node.style.left = left + "px";
              node.style.top = top + "px";
              node.style.width = width + "px";
              node.style.height = height + "px";
            }

            const dist = distanceToRect(playerX, playerY, zone.rect);
            if (!nearest || dist < nearest.dist) {
              nearest = { id: zone.id, dist: dist };
            }
          });

          if (presetZone && !activeId) {
            setFocused(presetZone.id);
            setFocusChipFromZone(presetZone.id);
          } else if (activeId && getSeatAgentByZoneId(activeId)) {
            const preferredSeatZoneId = getPreferredSeatSummaryZoneId();
            setFocused(preferredSeatZoneId);
            setFocusChipFromZone(preferredSeatZoneId);
          } else if (nearest && nearest.dist <= 170) {
            setFocused(nearest.id);
            setFocusChipFromZone(nearest.id);
          } else {
            setFocused(null);
            setFocusChipFromZone(null);
            if (!activeId) {
              renderDrawer(null);
            }
          }

          const playerTextX = isFiniteNumber(playerX) ? playerX.toFixed(1) : "n/a";
          const playerTextY = isFiniteNumber(playerY) ? playerY.toFixed(1) : "n/a";
          const cameraTextX = isFiniteNumber(viewX) ? viewX.toFixed(1) : "n/a";
          const cameraTextY = isFiniteNumber(viewY) ? viewY.toFixed(1) : "n/a";

          debug.textContent = [
            "scene: " + sceneKey,
            "player: " + playerTextX + ", " + playerTextY,
            "camera: " + cameraTextX + ", " + cameraTextY + " / " + viewW + "x" + viewH,
            "focus: " + (focusedId || "none"),
            "active: " + (activeId || "none"),
            "travel: " + (isFiniteNumber(TRAVEL.x) && isFiniteNumber(TRAVEL.y) ? (TRAVEL.x + ", " + TRAVEL.y) : "off"),
            "sceneTarget: " + (TRAVEL.scene || "off"),
            "travelDebug: " + travelDebug,
          ].join("\n");
        }

        window.addEventListener("keydown", function (event) {
          if (isInteractiveEnterTarget(event.target)) return;
          if (event.key === "Enter" && (focusedId || activeId)) {
            if (event.repeat) {
              event.preventDefault();
              return;
            }
            if (performFocusedEnterAction()) {
              event.preventDefault();
            }
          }
        });

        window.addEventListener("message", function (event) {
          if (event.origin !== window.location.origin) return;
          const payload = event.data || {};
          if (payload.type !== PARENT_FOCUS_SEAT_EVENT) return;
          if ((payload.projectId || projectId) !== projectId) return;
          focusSeatFromParent(payload.seatId);
        });

        focusSummary.addEventListener("click", function (event) {
          const target = event.target.closest("button[data-seat-summary-action]");
          if (!target) return;
          const action = target.dataset.seatSummaryAction || "";
          const zoneId = target.dataset.seatZone || getPreferredSeatSummaryZoneId();
          const signalKind = target.dataset.seatSignalKind || "";
          if (handleSeatSummaryAction(action, zoneId, signalKind)) {
            event.preventDefault();
            return;
          }
        });

        entitiesRoot.addEventListener("click", function (event) {
          const target = event.target.closest("button[data-seat-entity-action]");
          if (!target) return;
          const action = target.dataset.seatEntityAction || "";
          const zoneId = target.dataset.seatZone || "";
          const signalKind = target.dataset.kind || "";
          if (action !== "seat-enter" || !zoneId) return;
          if (performSeatZoneEnterAction(zoneId, signalKind)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        entitiesRoot.addEventListener("focusin", function (event) {
          const target = event.target.closest("button[data-seat-entity-action]");
          if (!target) return;
          const zoneId = target.dataset.seatZone || "";
          if (!zoneId) return;
          if (!getSeatAgentByZoneId(zoneId)) {
            if (String(zoneId || "").indexOf("codex-seat-") === 0) {
              clearStaleSeatRuntimeState(zoneId, false);
            }
            return;
          }
          setFocused(zoneId);
        }, true);

        focusChip.addEventListener("click", function (event) {
          if (performFocusedEnterAction()) {
            event.preventDefault();
          }
        });

        drawer.addEventListener("click", function (event) {
          const seatTarget = event.target.closest("button[data-seat-summary-action]");
          if (seatTarget) {
            const action = seatTarget.dataset.seatSummaryAction || "";
            const zoneId = seatTarget.dataset.seatZone || getPreferredSeatSummaryZoneId();
            const signalKind = seatTarget.dataset.seatSignalKind || "";
            if (handleSeatSummaryAction(action, zoneId, signalKind)) {
              event.preventDefault();
              return;
            }
          }
          const target = event.target.closest("button[data-action]");
          if (!target) return;
          handleAction(target.dataset.action);
        });

        window.setInterval(updateOverlay, 120);
        renderDrawer(null);
      })();
    </script>
  </body>
</html>
