<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#007aff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="灵动康复" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>灵动康复 ArmControl</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #faf9fe;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 430px);
        margin: 0 auto;
        min-height: 100vh;
        background: #faf9fe;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: calc(env(safe-area-inset-top) + 12px) 16px 10px;
        border-bottom: 1px solid #d9deea;
        background: rgba(250, 249, 254, 0.92);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0;
        color: #1a1b1f;
        font-size: 18px;
        line-height: 24px;
      }

      select {
        min-height: 40px;
        border: 1px solid #c1c6d7;
        border-radius: 6px;
        background: #fff;
        color: #1a1b1f;
        font-size: 14px;
        padding: 0 10px;
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 64px - env(safe-area-inset-top));
        border: 0;
        background: #faf9fe;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>灵动康复 ArmControl</h1>
        <select id="screen-picker" aria-label="切换 App 页面">
          <option value="./home.html">首页</option>
          <option value="./device.html">设备连接</option>
          <option value="./training-library.html">训练库</option>
          <option value="./ai-plan.html">AI 规划</option>
          <option value="./training-session.html">训练执行</option>
          <option value="./emg.html">肌电监测</option>
          <option value="./report.html">训练总结</option>
          <option value="./profile.html">个人档案</option>
        </select>
      </header>
      <iframe id="app-frame" title="灵动康复 ArmControl" src="./home.html"></iframe>
    </main>
    <script>
      const picker = document.getElementById("screen-picker");
      const frame = document.getElementById("app-frame");
      picker.addEventListener("change", () => {
        frame.src = picker.value;
      });
      window.addEventListener("message", (event) => {
        if (!event.data || event.data.type !== "rehab-arm-mobile:navigate") {
          return;
        }
        const target = `./${event.data.target}`;
        frame.src = target;
        picker.value = target;
      });
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
