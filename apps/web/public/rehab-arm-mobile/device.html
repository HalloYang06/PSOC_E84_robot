<script>
        function transitionToStep2() {
            // Hide Step 1 content
            document.querySelector('main > section:nth-of-type(3)').classList.add('hidden');
            // Show Step 2 content
            document.getElementById('step2-content').classList.remove('hidden');
            document.getElementById('step2-content').classList.add('flex');
            
            // Update Stepper UI
            const steps = document.querySelectorAll('.step-icon');
            // Make Step 2 active style
            steps[1].classList.remove('bg-surface-variant', 'text-on-surface-variant');
            steps[1].classList.add('bg-primary', 'text-on-primary', 'shadow-md');
            steps[1].nextElementSibling.classList.remove('text-on-surface-variant', 'opacity-70');
            steps[1].nextElementSibling.classList.add('text-primary');
            
            // Update progress line
            document.querySelector('.step-line').style.width = '66%';
        }

        function showBoundError() {
            document.getElementById('error-state').classList.remove('hidden');
        }
    </script>
