<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>个人中心 - 领动康复手臂</title>
  <style>
    * { 
      box-sizing: border-box; 
      writing-mode: horizontal-tb !important; 
      text-orientation: mixed !important; 
      word-break: keep-all; 
      overflow-wrap: normal; 
      letter-spacing: 0; 
      margin: 0;
      padding: 0;
    }

    body {
      max-width: 390px;
      min-height: 844px;
      margin: 0 auto;
      background: #f7faf9;
      padding-bottom: 84px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      color: #1a1c1b;
      line-height: 1.5;
    }

    .main-content {
      width: 350px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: #006a60;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #006a60;
      cursor: pointer;
    }

    /* Cards */
    .card {
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    /* Profile Summary */
    .profile-summary {
      display: flex;
      align-items: center;
    }
    .avatar {
      width: 64px;
      height: 64px;
      background: #e0f2f1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-right: 16px;
    }
    .profile-info h2 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .profile-info p {
      font-size: 14px;
      color: #6f7977;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: #f0fdfa;
      color: #006a60;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 4px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #3f4947;
    }
    .form-input {
      width: 100%;
      height: 48px;
      border: 1px solid #bec9c6;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 16px;
      background: #fbfdfc;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      height: 48px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:active {
      opacity: 0.8;
    }
    .btn-primary {
      background: #006a60;
      color: #ffffff;
      flex: 1;
    }
    .btn-secondary {
      background: #ffffff;
      color: #006a60;
      border: 1px solid #006a60;
      width: 120px;
    }

    /* Rehab Profile */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .status-badge {
      float: right;
      font-size: 14px;
      color: #6f7977;
      font-weight: normal;
    }
    .empty-state {
      padding: 32px 0;
      text-align: center;
      color: #6f7977;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      height: 84px;
      background: #ffffff;
      border-top: 1px solid #e1e3e1;
      display: flex;
      justify-content: space-around;
      padding-top: 8px;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-col;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 48px;
      color: #3f4947;
      text-decoration: none;
      font-size: 12px;
    }
    .nav-item.active {
      color: #006a60;
    }
    .nav-icon {
      font-size: 24px;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="icon-btn">‹</div>
    <h1 class="header-title">领动康复手臂</h1>
    <div class="icon-btn">⚙</div>
  </header>

  <main class="main-content">
    <!-- Profile Summary -->
    <section class="card">
      <div class="profile-summary">
        <div class="avatar">👤</div>
        <div class="profile-info">
          <h2>您好</h2>
          <p>请完善资料</p>
          <div class="tag">隐私合规保护中</div>
        </div>
      </div>
      <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eff1f0; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 14px; color: #3f4947;">云端账户</span>
        <span style="font-size: 14px; color: #006a60;">已同步</span>
      </div>
    </section>

    <!-- Phone Binding -->
    <section class="card">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input type="tel" class="form-input" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" class="form-input" placeholder="验证码">
          <button class="btn btn-secondary">获取验证码</button>
        </div>
      </div>
      <button class="btn btn-primary" style="width: 100%;">绑定手机号</button>
    </section>

    <!-- Rehab Profile -->
    <section class="card">
      <h3 class="section-title">
        我的康复档案
        <span class="status-badge">暂无数据</span>
      </h3>
      <div class="empty-state">
        <span class="empty-icon">📁</span>
        <p>暂无数据</p>
        <p style="font-size: 12px; margin-top: 4px;">完成首次评测即可生成档案</p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="#" class="nav-item">
      <span class="nav-icon">🏠</span>
      首页
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">🏋️</span>
      训练
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">👥</span>
      社区
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">💬</span>
      消息
    </a>
    <a href="#" class="nav-item active">
      <span class="nav-icon">👤</span>
      我的
    </a>
  </nav>

  <script id="l1-api-contract">
  const token = localStorage.getItem('access_token');
  fetch('/api/auth/session');
  fetch('/api/rehab-arm/app/v1/me', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json()).then(response => {
    const home = response.data.patient_view.home;
    const profile = response.data.patient_view.profile;
    const device = response.data.patient_view.device;
    const agent = response.data.patient_view.agent;
    renderModelStatus(response.data.model_status);
  });
  fetch('/api/rehab-arm/app/v1/account/phone-verifications', { method: 'POST' });
  fetch(`/api/rehab-arm/app/v1/account/phone-verifications/${verificationId}/confirm`, { method: 'POST' });
  if (error.code === 'PHONE_CODE_RESEND_TOO_SOON') showRetry(error.retry_after);
  if (error.code === 'PHONE_SMS_NOT_CONFIGURED') showSmsUnavailable();
  if (error.code === 'PHONE_SMS_DELIVERY_FAILED') showSmsFailed();
  fetch('/api/rehab-arm/app/v1/devices/bind', { method: 'POST' });
  if (error.code === 'DEVICE_ALREADY_BOUND') showAlreadyBound();
  fetch('/api/rehab-arm/app/v1/agent/messages', { method: 'POST' });
  if (error.code === 'UNSAFE_MOTION_REQUEST') showSafeRefusal();
  </script>
</body>
</html>
